<!DOCTYPE html>
<html lang="pt-br" class="h-full bg-[#030712]">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vitrine Corporativa | VideDigital</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .glass-card { background: rgba(13, 13, 17, 0.6); backdrop-filter: blur(24px); border: 1px solid rgba(255, 255, 255, 0.03); }
    </style>
</head>
<body class="h-full text-gray-200 bg-[#030712] flex flex-col justify-between min-h-screen">

    <header class="border-b border-white/5 bg-[#07070a]/90 backdrop-blur-md sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-6 py-4 flex justify-between items-center">
            <div class="flex items-center gap-2">
                <div class="h-4 w-4 rounded-md bg-gradient-to-tr from-[#00f2fe] to-[#4facfe] shadow-[0_0_10px_#00f2fe]"></div>
                <h1 id="nome-loja-header" class="text-base font-bold tracking-tight text-white">Carregando vitrine...</h1>
            </div>
            <span class="text-[10px] px-3 py-1 bg-emerald-500/10 text-emerald-400 border border-emerald-500/20 rounded-full font-bold uppercase tracking-wider flex items-center gap-1.5">
                <span class="h-1.5 w-1.5 rounded-full bg-emerald-400 animate-pulse"></span> Verificado
            </span>
        </div>
    </header>

    <main class="flex-1 max-w-6xl w-full mx-auto px-6 py-12 lg:py-16">
        <div class="mb-12 text-center md:text-left">
            <h2 class="text-2xl lg:text-3xl font-extrabold text-white tracking-tight">Soluções & Treinamentos</h2>
            <p class="text-gray-400 text-sm mt-2">Escolha uma das ofertas abaixo para obter acesso imediato ao ambiente seguro de checkout.</p>
        </div>

        <div id="vitrine-container" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
            <div class="animate-pulse bg-white/5 h-72 rounded-2xl"></div>
            <div class="animate-pulse bg-white/5 h-72 rounded-2xl"></div>
            <div class="animate-pulse bg-white/5 h-72 rounded-2xl"></div>
        </div>
    </main>

    <footer class="border-t border-white/5 py-6 bg-[#050508]">
        <div class="max-w-6xl mx-auto px-6 flex flex-col sm:flex-row justify-between items-center gap-4 text-[11px] text-gray-500">
            <p>© 2026 VideDigital Systems. Checkout seguro SSL integrado.</p>
            <p class="flex items-center gap-1.5">🔒 Conexão Criptografada de Ponta a Ponta</p>
        </div>
    </footer>

    <script type="module">
        import { db } from "./firebase-init.js";
        import { collection, doc, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const vitrineContainer = document.getElementById("vitrine-container");
        const nomeLojaHeader = document.getElementById("nome-loja-header");

        // Captura o parâmetro '?loja=slug_aqui' da URL
        const urlParams = new URLSearchParams(window.location.search);
        const lojaSlug = urlParams.get("loja");

        async function montarVitrinePublica() {
            if (!lojaSlug) {
                vitrineContainer.innerHTML = `
                    <div class="col-span-full text-center p-12 bg-red-500/5 border border-dashed border-red-500/20 rounded-2xl">
                        <p class="text-red-400 text-sm font-semibold">Parâmetro de vitrine ausente.</p>
                    </div>`;
                nomeLojaHeader.innerText = "Vitrine Não Encontrada";
                return;
            }

            try {
                // 1. Localiza o Fornecedor que é dono dessa URL personalizada
                const qUser = query(collection(db, "usuarios"), where("urlLoja", "==", lojaSlug.toLowerCase()));
                const queryUserSnap = await getDocs(qUser);

                if(queryUserSnap.empty) {
                    vitrineContainer.innerHTML = `
                        <div class="col-span-full text-center p-12 bg-white/[0.01] border border-dashed border-white/5 rounded-2xl">
                            <p class="text-gray-500 text-sm">A vitrine informada não corresponde a nenhum fornecedor ativo.</p>
                        </div>`;
                    nomeLojaHeader.innerText = "Desconectado";
                    return;
                }

                let fornecedorEmail = "";
                queryUserSnap.forEach((uDoc) => {
                    const d = uDoc.data();
                    fornecedorEmail = d.email;
                    nomeLojaHeader.innerText = d.nomeLoja || "Vitrine Comercial";
                });

                // 2. Coleta os produtos cadastrados por ele
                const qProd = query(collection(db, "produtos"), where("criadoPor", "==", fornecedorEmail.toLowerCase()));
                const queryProdSnap = await getDocs(qProd);

                vitrineContainer.innerHTML = "";

                if (queryProdSnap.empty) {
                    vitrineContainer.innerHTML = `
                        <div class="col-span-full text-center p-12 bg-white/[0.01] border border-dashed border-white/5 rounded-2xl">
                            <p class="text-gray-500 text-sm">Esta vitrine não possui ofertas públicas vigentes.</p>
                        </div>`;
                    return;
                }

                // 3. Renderiza os cards complexos
                queryProdSnap.forEach((docSnap) => {
                    const prod = docSnap.data();
                    const precoFormatado = parseFloat(prod.preco).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
                    
                    let linkDestino = prod.destinoValue || "#";
                    if (prod.tipoDestino === "whatsapp") {
                        linkDestino = `https://wa.me/55${prod.destinoValue}?text=Ol%C3%A1%21+Gostaria+de+saber+mais+detalhes+sobre+o+produto+${encodeURIComponent(prod.nome)}`;
                    }

                    const imagemSrc = prod.imagemB64 ? prod.imagemB64 : 'data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%"><rect width="100%" height="100%" fill="%230c0c12"/></svg>';

                    const card = document.createElement("div");
                    card.className = "glass-card rounded-2xl overflow-hidden flex flex-col justify-between border border-white/5 hover:border-white/10 transition-all shadow-xl relative group";
                    card.innerHTML = `
                        <div class="relative h-48 w-full bg-[#08080c] flex items-center justify-center overflow-hidden border-b border-white/5">
                            <img src="${imagemSrc}" alt="${prod.nome}" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500">
                            <div class="absolute top-3 left-3 flex flex-wrap gap-1">
                                <span class="text-[9px] font-bold text-white bg-black/60 backdrop-blur-md px-2.5 py-0.5 rounded-md uppercase tracking-wider">${prod.subnicho || 'Oferta'}</span>
                                ${prod.badgeCustom ? `<span class="text-[9px] font-bold text-black bg-[#00f2fe] px-2.5 py-0.5 rounded-md uppercase tracking-wider font-extrabold shadow-md">${prod.badgeCustom}</span>` : ''}
                            </div>
                            ${prod.vagasTag ? `<span class="absolute bottom-3 right-3 text-[9px] font-bold text-amber-400 bg-amber-950/80 border border-amber-500/20 backdrop-blur-md px-2 py-0.5 rounded-md uppercase tracking-wider">${prod.vagasTag}</span>` : ''}
                        </div>
                        <div class="p-6 flex-1 flex flex-col justify-between space-y-5">
                            <div>
                                <h3 class="text-base font-bold text-white tracking-tight line-clamp-1">${prod.nome}</h3>
                                <p class="text-xs text-gray-400 mt-1.5 line-clamp-2">${prod.descricao || 'Nenhuma especificação comercial fornecida.'}</p>
                            </div>
                            <div>
                                <div class="flex items-baseline gap-2">
                                    <p class="text-2xl font-black text-white tracking-tight">${precoFormatado}</p>
                                    ${prod.precoDe ? `<p class="text-xs text-gray-600 line-through">De R$ ${parseFloat(prod.precoDe).toFixed(2)}</p>` : ''}
                                </div>
                                <a href="${linkDestino}" target="_blank" class="w-full text-center block mt-4 ${prod.tipoDestino === 'whatsapp' ? 'bg-[#25D366] text-black hover:bg-[#1fbc57]' : 'bg-white text-black hover:bg-gray-200'} font-bold py-3.5 rounded-xl text-xs uppercase tracking-wider transition-all shadow-md">
                                    ${prod.tipoDestino === 'whatsapp' ? '💬 Chamar no WhatsApp' : '🛒 Adquirir Acesso'}
                                </a>
                            </div>
                        </div>
                    `;
                    vitrineContainer.appendChild(card);
                });

            } catch (err) {
                console.error(err);
                vitrineContainer.innerHTML = `<p class="text-center text-xs text-gray-500">Falha ao estabelecer conexão com a nuvem do lojista.</p>`;
            }
        }

        montarVitrinePublica();
    </script>
</body>
</html>
