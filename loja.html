<!DOCTYPE html>
<html lang="pt-br" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="client-tab-title">Vitrine Oficial</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; transition: background-color 0.3s ease; }
        .dynamic-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); border: 1px solid rgba(255,255,255,0.04); }
        .dynamic-card:hover { transform: translateY(-4px); box-shadow: 0 20px 40px rgba(0,0,0,0.4); border-color: var(--brand-color); }
        .search-glow:focus { box-shadow: 0 0 25px var(--brand-color); border-color: var(--brand-color); }
    </style>
</head>
<body id="client-body" class="bg-[#030712] text-gray-100 min-h-full pb-16">

    <!-- HEADER DA VITRINE PREMIUM -->
    <header class="max-w-6xl mx-auto px-6 pt-12 pb-8 text-center space-y-4">
        <h1 id="client-nome-loja" class="text-3xl font-extrabold tracking-tight text-white">Carregando Loja...</h1>
        <div class="max-w-2xl mx-auto space-y-2">
            <h2 id="client-titulo-hero" class="text-xl font-bold opacity-90"></h2>
            <p id="client-subtitulo" class="text-sm text-gray-400 leading-relaxed"></p>
        </div>

        <!-- BARRA DE BUSCA E INTERFACE AVANÇADA DE CLIENTE -->
        <div class="max-w-lg mx-auto pt-4 relative">
            <input type="text" id="search-input" class="w-full bg-white/5 border border-white/10 rounded-2xl p-4 pl-12 text-sm text-white outline-none search-glow transition-all" placeholder="Buscar produtos ou ofertas especiais...">
            <span class="absolute left-4 top-8 text-gray-500 text-sm">🔍</span>
        </div>

        <!-- FILTROS DE NICHOS EM REAL-TIME -->
        <div id="container-filtros" class="flex flex-wrap justify-center gap-2 pt-4">
            <button data-nicho="todos" class="filter-badge bg-white/10 text-white text-xs font-bold px-4 py-2 rounded-xl transition-all">✨ Todos</button>
            <button data-nicho="Automotivo" class="filter-badge bg-white/5 text-gray-400 text-xs font-bold px-4 py-2 rounded-xl transition-all">Automotivo</button>
            <button data-nicho="Utilidades" class="filter-badge bg-white/5 text-gray-400 text-xs font-bold px-4 py-2 rounded-xl transition-all">Utilidades</button>
            <button data-nicho="Confeitaria" class="filter-badge bg-white/5 text-gray-400 text-xs font-bold px-4 py-2 rounded-xl transition-all">Confeitaria</button>
            <button data-nicho="Barbearia" class="filter-badge bg-white/5 text-gray-400 text-xs font-bold px-4 py-2 rounded-xl transition-all">Barbearia</button>
            <button data-nicho="Estética" class="filter-badge bg-white/5 text-gray-400 text-xs font-bold px-4 py-2 rounded-xl transition-all">Estética</button>
        </div>
    </header>

    <!-- CONTAINER DE PRODUTOS -->
    <main class="max-w-6xl mx-auto px-6 mt-8">
        <div id="grid-produtos-cliente" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- Inserção reativa via JavaScript -->
        </div>
    </main>

    <script type="module">
        import { db } from "./firebase-init.js";
        import { collection, doc, getDoc, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const urlParams = new URLSearchParams(window.location.search);
        const slugLoja = urlParams.get("loja");

        let todosProdutos = [];
        let nichoSelecionado = "todos";

        if (!slugLoja) {
            document.getElementById("client-nome-loja").innerText = "Vitrine não encontrada";
        } else {
            inicializarVitrine();
        }

        async function inicializarVitrine() {
            try {
                // Buscando a vitrine pelo slug indexado de forma ultra otimizada
                const vitrineSnap = await getDoc(doc(db, "vitrines_publicas", slugLoja));
                
                if (vitrineSnap.exists()) {
                    const dados = vitrineSnap.data();
                    
                    // Renderizando Meta-dados e Textos Comerciais
                    document.getElementById("client-tab-title").innerText = dados.nomeLoja;
                    document.getElementById("client-nome-loja").innerText = dados.nomeLoja;
                    document.getElementById("client-titulo-hero").innerText = dados.tituloHero || "";
                    document.getElementById("client-subtitulo").innerText = dados.subtituloHero || "";

                    // ABSORÇÃO DINÂMICA DA PALETA DE CORES DO CLIENTE
                    const brand = dados.corDestaque || "#00f2fe";
                    const fundo = dados.corFundo || "#030712";
                    const card = dados.corCard || "#0c0c14";

                    document.documentElement.style.setProperty('--brand-color', brand);
                    document.getElementById("client-body").style.backgroundColor = fundo;

                    // Baixando os produtos atrelados ao dono da vitrine
                    const q = query(collection(db, "produtos"), where("criadoPor", "==", dados.emailDono));
                    const querySnapshot = await getDocs(q);
                    
                    querySnapshot.forEach(docSnap => {
                        todosProdutos.push({ id: docSnap.id, ...docSnap.data(), cardColor: card, brandColor: brand });
                    });

                    renderizarProdutos();
                } else {
                    document.getElementById("client-nome-loja").innerText = "Vitrine Inativa ou Inexistente.";
                }
            } catch (err) {
                console.error(err);
            }
        }

        function renderizarProdutos() {
            const grid = document.getElementById("grid-produtos-cliente");
            const busca = document.getElementById("search-input").value.toLowerCase();
            grid.innerHTML = "";

            const filtrados = todosProdutos.filter(p => {
                const bateNicho = (nichoSelecionado === "todos" || p.subnicho === nichoSelecionado);
                const bateTexto = p.nome.toLowerCase().includes(busca) || (p.descricao && p.descricao.toLowerCase().includes(busca));
                return bateNicho && bateTexto;
            });

            if(filtrados.length === 0) {
                grid.innerHTML = `<div class="col-span-full text-center text-gray-500 text-xs py-12">Nenhum produto correspondente disponível.</div>`;
                return;
            }

            filtrados.forEach(prod => {
                const cardHtml = document.createElement("div");
                cardHtml.className = "dynamic-card rounded-2xl overflow-hidden flex flex-col justify-between";
                cardHtml.style.backgroundColor = prod.cardColor;

                const imagemSrc = prod.imagemB64 || 'data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%"><rect width="100%" height="100%" fill="%230c0c14"/></svg>';

                cardHtml.innerHTML = `
                    <div class="relative h-56 bg-black/40 flex items-center justify-center overflow-hidden">
                        <img src="${imagemSrc}" class="w-full h-full object-cover">
                        <div class="absolute top-3 left-3 flex flex-wrap gap-1">
                            ${prod.badgeCustom ? `<span class="text-[9px] font-extrabold text-black px-2.5 py-1 rounded-md tracking-wider uppercase" style="background-color: ${prod.brandColor}">${prod.badgeCustom}</span>` : ''}
                            ${prod.vagasTag ? `<span class="text-[9px] font-extrabold bg-red-500/90 text-white px-2.5 py-1 rounded-md tracking-wider uppercase animate-pulse">${prod.vagasTag}</span>` : ''}
                        </div>
                    </div>
                    <div class="p-6 flex-1 flex flex-col justify-between space-y-4">
                        <div class="space-y-2">
                            <span class="text-[10px] font-bold tracking-widest uppercase opacity-40">${prod.subnicho || 'Oferta'}</span>
                            <h3 class="text-base font-bold text-white tracking-tight leading-tight">${prod.nome}</h3>
                            <p class="text-xs text-gray-400 line-clamp-3 leading-relaxed">${prod.descricao || ''}</p>
                        </div>
                        
                        <div class="pt-2">
                            <div class="flex items-baseline gap-2">
                                <span class="text-xl font-black text-white">R$ ${parseFloat(prod.preco).toFixed(2)}</span>
                                ${prod.precoDe ? `<span class="text-xs text-gray-500 line-through">R$ ${parseFloat(prod.precoDe).toFixed(2)}</span>` : ''}
                            </div>
                            <a href="${prod.destinoValue}" target="_blank" class="w-full block text-center font-bold text-xs uppercase tracking-wider py-4 rounded-xl mt-4 text-black transition-all hover:opacity-90" style="background-color: ${prod.brandColor}">
                                Adquirir Agora 🚀
                            </a>
                        </div>
                    </div>
                `;
                grid.appendChild(cardHtml);
            });
        }

        // CAPTURA INPUT DE BUSCA
        document.getElementById("search-input").addEventListener("input", renderizarProdutos);

        // CAPTURA EVENTOS DOS FILTROS POR SUBNICHO
        document.querySelectorAll(".filter-badge").forEach(btn => {
            btn.addEventListener("click", (e) => {
                document.querySelectorAll(".filter-badge").forEach(b => {
                    b.className = "filter-badge bg-white/5 text-gray-400 text-xs font-bold px-4 py-2 rounded-xl transition-all";
                });
                e.target.className = "filter-badge bg-white/10 text-white text-xs font-bold px-4 py-2 rounded-xl transition-all";
                nichoSelecionado = e.target.getAttribute("data-nicho");
                renderizarProdutos();
            });
        });
    </script>
</body>
</html>
