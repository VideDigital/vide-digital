<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vide Hub</title>
<script>
(function() {
    var params = new URLSearchParams(window.location.search);
    var caminhoRestaurado = params.get("p");
    if (caminhoRestaurado !== null) {
        var ehDominioPadrao = window.location.hostname === "videdigital.github.io";
        var base = ehDominioPadrao ? "/vide-digital/" : "/";
        params.delete("p");
        var restoQuery = params.toString();
        var novaURL = base + caminhoRestaurado + (restoQuery ? "?" + restoQuery : "") + window.location.hash;
        window.history.replaceState(null, "", novaURL);
    }
})();
</script>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
    body { font-family: 'Inter', sans-serif; background: #14132B; }
    h1, h2, h3 { font-family: 'Sora', sans-serif; }
</style>
</head>
<body class="min-h-screen text-white">
<div id="lp-container" class="min-h-screen flex items-center justify-center">
    <p class="text-gray-400 text-sm">Carregando...</p>
</div>
<script type="module">
(async function() {
    var ehDominioPadrao = window.location.hostname === "videdigital.github.io";
    var base = ehDominioPadrao ? "/vide-digital/" : "/";

    // Import absoluto (nao relativo) -- evita quebrar quando a URL "fake" tem varios niveis (ex: /teste/lp1)
    const firebaseInit = await import(base + "firebase-init.js");
    const { doc, getDoc } = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js");
    const db = firebaseInit.db;

    var caminho = window.location.pathname.indexOf(base) === 0 ? window.location.pathname.slice(base.length) : window.location.pathname.replace(/^\//, "");
    var segmentos = caminho.split("/").filter(Boolean);
    if (segmentos.length && segmentos[segmentos.length - 1].toLowerCase() === "index.html") {
        segmentos.pop();
    }

    async function resolverLojaPorDominio(hostname) {
        // TODO: quando o recurso de dominio proprio existir, buscar aqui
        // a loja dona desse hostname (ex: colecao "dominios_personalizados").
        return null;
    }

    async function renderizarLandingPage(lojaSlug, paginaSlug) {
        const container = document.getElementById("lp-container");
        const docId = lojaSlug.toLowerCase() + "__" + paginaSlug.toLowerCase();
        try {
            const metaSnap = await getDoc(doc(db, "landing_pages_publicas", docId));
            if (!metaSnap.exists() || metaSnap.data().publicado !== true) {
                mostrarErro();
                return;
            }
            const meta = metaSnap.data();
            document.title = meta.titulo || "Vide Hub";
            container.className = "min-h-screen";
            container.innerHTML = "";
            const ordemBlocos = meta.ordemBlocos || [];
            for (const blocoId of ordemBlocos) {
                const blocoSnap = await getDoc(doc(db, "landing_pages_blocos_publicas", blocoId));
                if (blocoSnap.exists() && blocoSnap.data().visivel !== false) {
                    container.insertAdjacentHTML("beforeend", renderizarBloco(blocoSnap.data()));
                }
            }
        } catch (erro) {
            console.error("Erro ao carregar landing page:", erro);
            document.getElementById("lp-container").innerHTML = '<p class="text-red-400 text-xs px-6 text-center">Erro: ' + erro.message + '</p>';
        }
    }

   function renderizarBloco(bloco) {
        const d = bloco.design || {};
        const corFundo = d.corFundo || "";
        const imagemFundo = d.imagemFundoB64 || "";
        const corSobreposicao = d.corSobreposicao || "#000000";
        const opacidade = (d.opacidadeSobreposicao || 0) / 100;
        const corBotaoFundo = d.corBotaoFundo || "";
        const corBotaoBorda = d.corBotaoBorda || "";
        const corBotaoTexto = d.corBotaoTexto || "";
        const paddingTop = d.paddingTop !== undefined ? d.paddingTop : 64;
        const paddingBottom = d.paddingBottom !== undefined ? d.paddingBottom : 64;
        const alinhamento = d.alinhamento || "esquerda";
        const textAlignClasse = alinhamento === "centro" ? "text-center" : alinhamento === "direita" ? "text-right" : "text-left";
        const itemsClasse = alinhamento === "centro" ? "items-center" : alinhamento === "direita" ? "items-end" : "items-start";
        const idSecaoAttr = d.idSecao ? ` id="${d.idSecao}"` : "";
        const visivelDesktop = d.visivelDesktop !== false;
        const visivelMobile = d.visivelMobile !== false;
        let visClasse = "";
        if (visivelDesktop && !visivelMobile) visClasse = "hidden md:block";
        else if (!visivelDesktop && visivelMobile) visClasse = "block md:hidden";
        else if (!visivelDesktop && !visivelMobile) visClasse = "hidden";
        const loadingAttr = d.priorizarImagem ? ' loading="eager" fetchpriority="high"' : ' loading="lazy"';
        const estiloFundo = imagemFundo
            ? `background-image: url('${imagemFundo}'); background-size: cover; background-position: center;`
            : (corFundo ? `background-color: ${corFundo};` : "");
        const overlayHtml = imagemFundo
            ? `<div style="position:absolute; inset:0; background-color:${corSobreposicao}; opacity:${opacidade};"></div>`
            : "";
        const estiloBotao = `${corBotaoFundo ? "background-color:" + corBotaoFundo + ";" : ""}${corBotaoBorda ? "border: 2px solid " + corBotaoBorda + ";" : ""}${corBotaoTexto ? "color:" + corBotaoTexto + ";" : ""}`;
        const classeBotao = `inline-block font-bold px-6 py-3 rounded-xl ${!corBotaoFundo ? "bg-white" : ""} ${!corBotaoTexto ? "text-black" : ""}`;
        const classeBotaoForm = `w-full font-bold py-3 rounded-xl ${!corBotaoFundo ? "bg-white" : ""} ${!corBotaoTexto ? "text-black" : ""}`;
        let conteudoHtml = "";
        if (bloco.tipo === "texto_midia") {
            conteudoHtml = `
                <div class="max-w-5xl mx-auto px-6 grid md:grid-cols-2 gap-10 ${itemsClasse}">
                    <div class="${bloco.props.posicaoImagem === "esquerda" ? "md:order-2" : ""} ${textAlignClasse}">
                        <h2 class="text-3xl font-bold mb-4">${bloco.props.titulo || ""}</h2>
                        <p class="text-gray-300 mb-6">${bloco.props.subtitulo || ""}</p>
                        ${bloco.props.botaoTexto ? `<a href="${bloco.props.botaoLink || "#"}" style="${estiloBotao}" class="${classeBotao}">${bloco.props.botaoTexto}</a>` : ""}
                    </div>
                    <div class="${bloco.props.posicaoImagem === "esquerda" ? "md:order-1" : ""}">
                        ${bloco.props.imagemB64 ? `<img src="${bloco.props.imagemB64}"${loadingAttr} class="rounded-2xl w-full">` : ""}
                    </div>
                </div>`;
        } else if (bloco.tipo === "formulario_captura") {
            conteudoHtml = `
                <div class="max-w-md mx-auto px-6 ${textAlignClasse}">
                    <h2 class="text-2xl font-bold mb-6">${bloco.props.titulo || ""}</h2>
                    <form class="space-y-3 text-left">
                        ${(bloco.props.campos || []).map(campo => `<input type="text" placeholder="${campo}" class="w-full p-3 rounded-xl bg-white/5 border border-white/10 text-white">`).join("")}
                        <button type="submit" style="${estiloBotao}" class="${classeBotaoForm}">${bloco.props.textoBotao || "Enviar"}</button>
                    </form>
                </div>`;
        } else if (bloco.tipo === "faq") {
            const itens = bloco.props.itens || [];
            conteudoHtml = `
                <div class="max-w-3xl mx-auto px-6 ${textAlignClasse}">
                    ${bloco.props.titulo ? `<h2 class="text-3xl font-bold mb-8">${bloco.props.titulo}</h2>` : ""}
                    <div class="space-y-3 text-left">
                        ${itens.map(item => `
                            <details class="bg-white/5 border border-white/10 rounded-xl p-4">
                                <summary class="font-bold cursor-pointer">${item.pergunta || ""}</summary>
                                <p class="text-gray-300 mt-2 text-sm">${item.resposta || ""}</p>
                            </details>
                        `).join("")}
                    </div>
                </div>`;
        } else if (bloco.tipo === "galeria_imagens") {
            const imagens = bloco.props.imagens || [];
            conteudoHtml = `
                <div class="max-w-5xl mx-auto px-6 ${textAlignClasse}">
                    ${bloco.props.titulo ? `<h2 class="text-3xl font-bold mb-8">${bloco.props.titulo}</h2>` : ""}
                    <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
                        ${imagens.map(img => `<img src="${img}"${loadingAttr} class="w-full h-40 object-cover rounded-xl">`).join("")}
                    </div>
                </div>`;
        } else if (bloco.tipo === "lista_cards") {
            const cards = bloco.props.cards || [];
            conteudoHtml = `
                <div class="max-w-5xl mx-auto px-6 ${textAlignClasse}">
                    ${bloco.props.titulo ? `<h2 class="text-3xl font-bold mb-8">${bloco.props.titulo}</h2>` : ""}
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4 text-left">
                        ${cards.map(card => `
                            <div class="bg-white/5 border border-white/10 rounded-xl p-5">
                                ${card.icone ? `<div class="text-2xl mb-2">${card.icone}</div>` : ""}
                                <h3 class="font-bold mb-1">${card.titulo || ""}</h3>
                                <p class="text-gray-400 text-sm">${card.texto || ""}</p>
                            </div>
                        `).join("")}
                    </div>
                </div>`;
        } else if (bloco.tipo === "tabela_comparativo") {
            const linhas = bloco.props.linhas || [];
            conteudoHtml = `
                <div class="max-w-3xl mx-auto px-6 ${textAlignClasse}">
                    ${bloco.props.titulo ? `<h2 class="text-3xl font-bold mb-8">${bloco.props.titulo}</h2>` : ""}
                    <table class="w-full text-left border-collapse text-sm">
                        <thead>
                            <tr class="border-b border-white/10">
                                <th class="p-3"></th>
                                <th class="p-3 font-bold">${bloco.props.coluna1 || ""}</th>
                                <th class="p-3 font-bold">${bloco.props.coluna2 || ""}</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${linhas.map(linha => `
                                <tr class="border-b border-white/5">
                                    <td class="p-3 text-gray-400">${linha.label || ""}</td>
                                    <td class="p-3">${linha.valor1 || ""}</td>
                                    <td class="p-3">${linha.valor2 || ""}</td>
                                </tr>
                            `).join("")}
                        </tbody>
                    </table>
                </div>`;
        } else if (bloco.tipo === "texto_rico") {
            const paragrafos = (bloco.props.conteudo || "").split(/\\n\\s*\\n/).filter(p => p.trim());
            conteudoHtml = `
                <div class="max-w-3xl mx-auto px-6 ${textAlignClasse}">
                    ${bloco.props.titulo ? `<h2 class="text-3xl font-bold mb-6">${bloco.props.titulo}</h2>` : ""}
                    <div class="text-gray-300 space-y-4 leading-relaxed">
                        ${paragrafos.map(p => `<p>${p}</p>`).join("")}
                    </div>
                </div>`;
        } else if (bloco.tipo === "codigo_iframe") {
            conteudoHtml = bloco.props.url
                ? `<div class="max-w-5xl mx-auto px-6"><iframe src="${bloco.props.url}" style="width:100%; height:${bloco.props.altura || 400}px; border:0;" class="rounded-xl"></iframe></div>`
                : "";
        }
        return `<section${idSecaoAttr} class="relative ${visClasse}" style="${estiloFundo} padding-top:${paddingTop}px; padding-bottom:${paddingBottom}px;">
            ${overlayHtml}
            <div class="relative">${conteudoHtml}</div>
        </section>`;
    }

    function mostrarErro() {
        document.getElementById("lp-container").innerHTML = '<p class="text-gray-400 text-sm">Pagina nao encontrada.</p>';
    }

    if (segmentos.length === 0) {
        window.location.href = "login.html";
    } else if (ehDominioPadrao && segmentos.length === 2) {
        setTimeout(function() {
            var c = document.getElementById("lp-container");
            if (c && c.textContent.indexOf("Carregando") !== -1) {
                c.innerHTML = '<p class="text-amber-400 text-xs px-6 text-center">Travou carregando ha mais de 8s (loja=' + segmentos[0] + ', pagina=' + segmentos[1] + ')</p>';
            }
        }, 8000);
        renderizarLandingPage(segmentos[0], segmentos[1]);
    } else if (!ehDominioPadrao && segmentos.length === 1) {
        resolverLojaPorDominio(window.location.hostname).then(function(lojaSlug) {
            if (lojaSlug) renderizarLandingPage(lojaSlug, segmentos[0]);
            else mostrarErro();
        });
    } else {
        mostrarErro();
    }
})();
</script>
</body>
</html>
