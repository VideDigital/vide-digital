<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vitrine Digital - Carregando...</title>
    <style>
        /* Estilo Dark Premium e de Alta Conversão */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #0b0b0b; color: #fff; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 20px; padding-bottom: 60px; }
        
        /* Cabeçalho da Vitrine */
        .store-header { text-align: center; margin-top: 50px; margin-bottom: 50px; width: 100%; max-width: 1100px; }
        .store-title { font-size: 36px; font-weight: bold; letter-spacing: 0.5px; text-transform: capitalize; }
        .store-title span { color: #00bcd4; }
        .store-subtitle { color: #888; font-size: 14px; margin-top: 10px; font-weight: 500; }

        /* Grade Responsiva de Exibição dos Produtos */
        .vitrine-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 30px; width: 100%; max-width: 1100px; }
        
        /* Card do Produto */
        .product-card { background-color: #121212; border: 1px solid #222; border-radius: 16px; padding: 20px; display: flex; flex-direction: column; transition: transform 0.25s ease, border-color 0.25s ease; box-shadow: 0 4px 25px rgba(0,0,0,0.4); }
        .product-card:hover { transform: translateY(-5px); border-color: #00bcd4; }
        
        .product-img { width: 100%; height: 210px; object-fit: cover; border-radius: 12px; margin-bottom: 18px; background-color: #1a1a1a; border: 1px solid #252525; }
        
        .product-info { flex-grow: 1; display: flex; flex-direction: column; }
        .product-name { font-size: 18px; font-weight: 600; color: #fff; margin-bottom: 8px; line-height: 1.4; }
        .product-desc { font-size: 13px; color: #aaa; margin-bottom: 18px; line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; text-overflow: ellipsis; min-height: 58px; }
        
        /* Preços e Condições */
        .product-price-container { margin-top: auto; margin-bottom: 18px; }
        .product-price { font-size: 24px; font-weight: bold; color: #00bcd4; }
        .product-installment { font-size: 12px; color: #888; margin-top: 3px; font-weight: 500; }
        
        /* Chamadas para Ação (CTAs) de Alta Conversão */
        .btn-action { width: 100%; border: none; padding: 14px; border-radius: 10px; font-size: 15px; font-weight: bold; cursor: pointer; text-align: center; text-decoration: none; transition: background 0.2s; display: block; }
        
        /* Estilo Botão de Checkout (Kiwify, Hotmart, etc) */
        .btn-checkout { background-color: #00bcd4; color: #fff; }
        .btn-checkout:hover { background-color: #0097a7; }
        
        /* Estilo Botão de WhatsApp */
        .btn-whatsapp { background-color: #25d366; color: #fff; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-whatsapp:hover { background-color: #1ebd58; }

        /* Tela de Carregamento Embutida (Loader) */
        .loading-overlay { display: flex; flex-direction: column; align-items: center; justify-content: center; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background-color: #0b0b0b; z-index: 9999; }
        .spinner { border: 4px solid rgba(255,255,255,0.08); width: 45px; height: 45px; border-radius: 50%; border-left-color: #00bcd4; animation: spin 1s linear infinite; margin-bottom: 18px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #loader-text { color: #888; font-size: 14px; font-weight: 500; text-align: center; line-height: 1.6; padding: 0 20px; }
    </style>
</head>
<body>

    <div id="loader" class="loading-overlay">
        <div class="spinner"></div>
        <p id="loader-text">Sincronizando infraestrutura e carregando vitrine comercial...</p>
    </div>

    <header class="store-header">
        <h1 class="store-title" id="store-name">Minha Loja <span>Vide</span></h1>
        <p class="store-subtitle" id="store-desc">Explore nossos produtos e treinamentos digitais exclusivos</p>
    </header>

    <main class="vitrine-grid" id="vitrine-produtos-grid"></main>

    <script type="module" src="index.js"></script>
</body>
</html>
