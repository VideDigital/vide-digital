<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carregando Vitrine...</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="loading-screen" class="loading-overlay">
        <div class="loader-content">
            <div class="spinner"></div>
            <p id="loading-text">Sincronizando infraestrutura e carregando vitrine comercial...</p>
        </div>
    </div>

    <div id="store-wrapper" class="hidden animate-fade-in">
        
        <header class="store-header">
            <div class="avatar-container" id="store-avatar-wrapper">
                <img id="store-logo" src="" alt="Logo da Loja" class="store-avatar">
            </div>
            <h1 id="store-title">Nome da Loja</h1>
            <p id="store-subtitle">Sua descrição personalizada aparecerá aqui.</p>
            
            <div id="social-links" class="social-grid"></div>
        </header>

        <section class="tabs-section">
            <div class="tabs-container">
                <button id="btn-fisicos" class="tab-button active"><i class="fa-solid fa-box"></i> Produtos Físicos</button>
                <button id="btn-digitais" class="tab-button"><i class="fa-solid fa-bolt"></i> Produtos Digitais</button>
            </div>
        </section>

        <main class="store-container">
            <div id="products-grid" class="products-grid">
                </div>
            <div id="empty-state" class="empty-state hidden">
                <i class="fa-solid fa-bag-shopping"></i>
                <h3>Nenhum produto disponível no momento</h3>
                <p>Volte mais tarde para conferir as novidades da nossa vitrine.</p>
            </div>
        </main>

        <footer class="store-footer">
            <p>&copy; <span id="year-copy"></span> <strong id="footer-store-name">Sua Vitrine</strong> - Todos os direitos reservados.</p>
            <span class="powered-by">Tecnologia por Vide Digital</span>
        </footer>
    </div>

    <script type="module" src="index.js"></script>
</body>
</html>
