<!DOCTYPE html>
<html lang="pt-br" class="h-full bg-[#03040B]">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VideDigital | Painel de Controle</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
</head>
<body class="h-full text-white bg-[#03040B] relative overflow-hidden">

    <div class="absolute top-[-20%] left-[-10%] h-[600px] w-[600px] rounded-full bg-[#00f2fe]/10 blur-[140px] pointer-events-none"></div>

    <div class="min-h-screen flex flex-col relative z-10">
        <header class="border-b border-white/5 bg(12,13,26,0.5) backdrop-blur-md px-6 py-4 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="h-9 w-9 rounded-xl bg-gradient-to-tr from-[#00f2fe] to-[#4facfe] flex items-center justify-center shadow-[0_0_20px_rgba(0,242,254,0.3)]">
                    <span class="text-black font-extrabold text-xs">V</span>
                </div>
                <span class="font-bold tracking-tight text-sm">Dashboard Ecossistema</span>
            </div>
            
            <div class="flex items-center gap-4">
                <span id="user-display-email" class="text-xs text-gray-400 font-medium">Carregando usuário...</span>
                <button id="btn-logout" class="px-3 py-1.5 bg-white/5 hover:bg-red-500/20 hover:text-red-400 border border-white/10 rounded-lg text-xs font-semibold transition-all">
                    Sair
                </button>
            </div>
        </header>

        <main class="flex-1 p-8 max-w-7xl w-full mx-auto space-y-6">
            <div class="space-y-1">
                <h1 class="text-2xl font-extrabold tracking-tight">Bem-vindo ao seu Ecossistema</h1>
                <p class="text-xs text-gray-400">Gerencie suas vitrines e acompanhe métricas em tempo real.</p>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-5">
                <div class="bg-white/[0.02] border border-white/5 rounded-2xl p-6 space-y-2 backdrop-blur-xl">
                    <p class="text-[10px] font-bold text-gray-500 uppercase tracking-wider">Vitrines Ativas</p>
                    <p class="text-3xl font-black text-white">01</p>
                </div>
                <div class="bg-white/[0.02] border border-white/5 rounded-2xl p-6 space-y-2 backdrop-blur-xl">
                    <p class="text-[10px] font-bold text-gray-500 uppercase tracking-wider">Visualizações (Mês)</p>
                    <p class="text-3xl font-black text-[#00f2fe]">1,240</p>
                </div>
                <div class="bg-white/[0.02] border border-white/5 rounded-2xl p-6 space-y-2 backdrop-blur-xl">
                    <p class="text-[10px] font-bold text-gray-500 uppercase tracking-wider">Status do Servidor</p>
                    <p class="text-xs font-semibold text-emerald-400 flex items-center gap-1.5 pt-2">
                        <span class="h-2 w-2 rounded-full bg-emerald-400 animate-pulse"></span> Operacional
                    </p>
                </div>
            </div>
        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

        // Configuração Oficial de Produção
        const firebaseConfig = {
            apiKey: "AIzaSyBON-cfEpnuQf496m9pnZJW24XoR_2nlwc",
            authDomain: "vide-digital-saas.firebaseapp.com",
            projectId: "vide-digital-saas",
            storageBucket: "vide-digital-saas.firebasestorage.app",
            messagingSenderId: "891590456336",
            appId: "1:891590456336:web:bd51ac50399465b886c695"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        const userDisplay = document.getElementById("user-display-email");

        // SEGURANÇA ATIVA: Monitora a sessão e barra intrusos ou e-mails excluídos
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                try {
                    // Força a validação do token com o servidor do Firebase.
                    // Se o usuário foi deletado do banco, isso vai falhar e acionar o catch.
                    await user.getIdToken(true);
                    
                    // Exibe o e-mail no cabeçalho se estiver tudo correto
                    if (userDisplay) userDisplay.textContent = user.email;
                } catch (error) {
                    console.error("Sessão inválida ou usuário removido:", error);
                    await signOut(auth);
                    window.location.href = "login.html";
                }
            } else {
                // Se não há usuário logado, manda direto para a página de login
                window.location.href = "login.html";
            }
        });

        // Ação do Botão de Sair
        const btnLogout = document.getElementById("btn-logout");
        if (btnLogout) {
            btnLogout.addEventListener("click", async () => {
                await signOut(auth);
                window.location.href = "login.html";
            });
        }
    </script>
</body>
</html>
