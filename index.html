<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vide Hub</title>
<script>
(function() {
    var params = new URLSearchParams(window.location.search);
    var caminhoRestaurado = params.get("p");
    if (caminhoRestaurado !== null) {
        var ehDominioPadrao = window.location.hostname === "videdigital.github.io";
        var base = ehDominioPadrao ? "/vide-digital/" : "/";
        params.delete("p");
        var restoQuery = params.toString();
        var novaURL = base + caminhoRestaurado + (restoQuery ? "?" + restoQuery : "") + window.location.hash;
        window.history.replaceState(null, "", novaURL);
    }
})();
</script>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
    html { scroll-behavior: smooth; }
    body { font-family: 'Inter', sans-serif; background: #14132B; }
    h1, h2, h3 { font-family: 'Sora', sans-serif; }
</style>
</head>
<body class="min-h-screen text-white">
<div id="lp-container" class="min-h-screen flex items-center justify-center">
    <p class="text-gray-400 text-sm">Carregando...</p>
</div>
<script type="module">
(async function() {
    var ehDominioPadrao = window.location.hostname === "videdigital.github.io";
    var base = ehDominioPadrao ? "/vide-digital/" : "/";

    // Import absoluto (nao relativo) -- evita quebrar quando a URL "fake" tem varios niveis (ex: /teste/lp1)
    const firebaseInit = await import(base + "firebase-init.js");
    const { doc, getDoc, getDocs, setDoc, collection, query, where } = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js");
    const { onAuthStateChanged } = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js");
    const db = firebaseInit.db;
    const auth = firebaseInit.auth;

    var caminho = window.location.pathname.indexOf(base) === 0 ? window.location.pathname.slice(base.length) : window.location.pathname.replace(/^\//, "");
    var segmentos = caminho.split("/").filter(Boolean);
    if (segmentos.length && segmentos[segmentos.length - 1].toLowerCase() === "index.html") {
        segmentos.pop();
    }
    var modoPreview = new URLSearchParams(window.location.search).get("preview") === "1";

    function aguardarAuth() {
        return new Promise(function(resolve) {
            const unsub = onAuthStateChanged(auth, function(user) {
                unsub();
                resolve(user);
            });
        });
    }

    async function resolverLojaPorDominio(hostname) {
        // TODO: quando o recurso de dominio proprio existir, buscar aqui
        // a loja dona desse hostname (ex: colecao "dominios_personalizados").
        return null;
    }

function executarScriptsEmElemento(container) {
    const scripts = container.querySelectorAll("script");
    scripts.forEach(scriptAntigo => {
        const scriptNovo = document.createElement("script");
        Array.from(scriptAntigo.attributes).forEach(attr => scriptNovo.setAttribute(attr.name, attr.value));
        scriptNovo.textContent = scriptAntigo.textContent;
        scriptAntigo.parentNode.replaceChild(scriptNovo, scriptAntigo);
    });
}
async function renderizarBlocosNoContainer(container, colecaoBlocos, ordemBlocos, modoLayout) {
    const blocosCarregados = [];
    for (const blocoId of ordemBlocos) {
        const blocoSnap = await getDoc(doc(db, colecaoBlocos, blocoId));
        if (blocoSnap.exists() && blocoSnap.data().visivel !== false) {
            blocosCarregados.push(blocoSnap.data());
        }
    }
    if (modoLayout === "livre") {
            const alturaCanvas = Math.max(400, ...blocosCarregados.map(b => (b.y || 20) + (b.altura || 220) + 40));
            const canvasDiv = document.createElement("div");
            canvasDiv.className = "relative";
            canvasDiv.style.height = alturaCanvas + "px";
            canvasDiv.style.width = "1440px";
            container.style.overflowX = "auto";
            container.appendChild(canvasDiv);
            for (const bloco of blocosCarregados) {
                canvasDiv.insertAdjacentHTML("beforeend", await renderizarBloco(bloco, "livre"));
            }
        } else {
            for (const bloco of blocosCarregados) {
                container.insertAdjacentHTML("beforeend", await renderizarBloco(bloco, "empilhado"));
            }
        }
    }
    window.enviarFormularioLP = async function(event) {
        event.preventDefault();
        const form = event.target;
        const dados = {};
        form.querySelectorAll("input").forEach(inp => { dados[inp.placeholder] = inp.value.trim(); });
        if (!dados.nome && !dados.whatsapp && !dados.email) return false;
        try {
            await setDoc(doc(db, "leads", `lead_lp_${Date.now()}`), {
                criadoPor: window.lpDonoUIDAtual || "",
                nome: dados.nome || "",
                whatsapp: dados.whatsapp || "",
                email: dados.email || "",
                origem: "Landing Page",
                produtoInteresse: document.title || "Landing Page",
                cliques: 0,
                data: Date.now()
            });
            form.innerHTML = '<p class="text-center text-white font-bold py-4">Recebemos seus dados! Em breve entraremos em contato.</p>';
        } catch (err) {
            console.error(err);
            form.innerHTML = '<p class="text-center text-red-400 text-sm py-4">Erro ao enviar, tenta de novo.</p>';
        }
        return false;
    };
    async function renderizarLandingPage(lojaSlug, paginaSlug) {
        const container = document.getElementById("lp-container");
        const docId = lojaSlug.toLowerCase() + "__" + paginaSlug.toLowerCase();
        try {
            const metaSnap = await getDoc(doc(db, "landing_pages_publicas", docId));
            if (!metaSnap.exists() || metaSnap.data().publicado !== true) {
                mostrarErro();
                return;
            }
            const meta = metaSnap.data();
            window.lpDonoUIDAtual = meta.donoUID || null;
            document.title = meta.titulo || "Vide Hub";
            container.className = "min-h-screen";
            container.innerHTML = "";
            await renderizarBlocosNoContainer(container, "landing_pages_blocos_publicas", meta.ordemBlocos || [], meta.modoLayout || "empilhado");
        } catch (erro) {
            console.error("Erro ao carregar landing page:", erro);
            document.getElementById("lp-container").innerHTML = '<p class="text-red-400 text-xs px-6 text-center">Erro: ' + erro.message + '</p>';
        }
    }
    async function renderizarLandingPagePreview(paginaSlug) {
        const container = document.getElementById("lp-container");
        try {
            const user = await aguardarAuth();
            if (!user) {
                container.className = "min-h-screen flex items-center justify-center";
                container.innerHTML = '<div class="text-center px-6"><p class="text-sm text-gray-300 mb-4">Voce precisa estar logado pra ver esta previa.</p><a href="login.html" class="inline-block bg-white text-black font-bold px-5 py-2.5 rounded-xl text-xs">Fazer login</a></div>';
                return;
            }
            const snap = await getDocs(query(collection(db, "landing_pages"), where("donoUID", "==", user.uid), where("pagina", "==", paginaSlug)));
            if (snap.empty) {
                mostrarErro();
                return;
            }
            const lp = snap.docs[0].data();
            document.title = "[Rascunho] " + (lp.titulo || "Vide Hub");
            container.className = "min-h-screen";
            container.innerHTML = '<div class="fixed top-0 inset-x-0 z-50 bg-amber-500 text-black text-xs font-bold text-center py-1.5">RASCUNHO -- visivel so pra voce</div><div style="height:32px;"></div>';
            await renderizarBlocosNoContainer(container, "landing_pages_blocos", lp.ordemBlocos || [], lp.modoLayout || "empilhado");
        } catch (erro) {
            console.error("Erro ao carregar previa:", erro);
            document.getElementById("lp-container").innerHTML = '<p class="text-red-400 text-xs px-6 text-center">Erro: ' + erro.message + '</p>';
        }
    }
    
    function envolverCarrossel(idUnico, slidesHtml) {
        return `
            <div class="relative">
                <div id="${idUnico}" class="flex overflow-x-auto snap-x snap-mandatory gap-4 scroll-smooth" style="scrollbar-width: none;">
                    ${slidesHtml}
                </div>
                <button onclick="document.getElementById('${idUnico}').scrollBy({left: -320, behavior: 'smooth'})" class="absolute left-2 top-1/2 -translate-y-1/2 bg-black/50 hover:bg-black/70 text-white rounded-full w-9 h-9 flex items-center justify-center">&larr;</button>
                <button onclick="document.getElementById('${idUnico}').scrollBy({left: 320, behavior: 'smooth'})" class="absolute right-2 top-1/2 -translate-y-1/2 bg-black/50 hover:bg-black/70 text-white rounded-full w-9 h-9 flex items-center justify-center">&rarr;</button>
            </div>
        `;
    }
    async function renderizarBloco(bloco, modoLayout) {
        const d = bloco.design || {};
        const corFundo = d.corFundo || "";
        const imagemFundo = d.imagemFundoB64 || "";
        const corSobreposicao = d.corSobreposicao || "#000000";
        const opacidade = (d.opacidadeSobreposicao || 0) / 100;
        const corBotaoFundo = d.corBotaoFundo || "";
        const corBotaoBorda = d.corBotaoBorda || "";
        const corBotaoTexto = d.corBotaoTexto || "";
        const paddingTop = d.paddingTop !== undefined ? d.paddingTop : 64;
        const paddingBottom = d.paddingBottom !== undefined ? d.paddingBottom : 64;
        const alinhamento = d.alinhamento || "esquerda";
        const textAlignClasse = alinhamento === "centro" ? "text-center" : alinhamento === "direita" ? "text-right" : "text-left";
        const itemsClasse = alinhamento === "centro" ? "items-center" : alinhamento === "direita" ? "items-end" : "items-start";
        const justifyClasse = alinhamento === "centro" ? "justify-center" : alinhamento === "direita" ? "justify-end" : "justify-start";
        const idSecaoAttr = d.idSecao ? ` id="${d.idSecao.replace(/^#+/, "")}"` : "";
        const visivelDesktop = d.visivelDesktop !== false;
        const visivelMobile = d.visivelMobile !== false;
        let visClasse = "";
        if (visivelDesktop && !visivelMobile) visClasse = "hidden md:block";
        else if (!visivelDesktop && visivelMobile) visClasse = "block md:hidden";
        else if (!visivelDesktop && !visivelMobile) visClasse = "hidden";
        const loadingAttr = d.priorizarImagem ? ' loading="eager" fetchpriority="high"' : ' loading="lazy"';
        const estiloFundo = imagemFundo
            ? `background-image: url('${imagemFundo}'); background-size: cover; background-position: center;`
            : (corFundo ? `background-color: ${corFundo};` : "");
        const overlayHtml = imagemFundo
            ? `<div style="position:absolute; inset:0; background-color:${corSobreposicao}; opacity:${opacidade};"></div>`
            : "";
        const estiloBotao = `${corBotaoFundo ? "background-color:" + corBotaoFundo + ";" : ""}${corBotaoBorda ? "border: 2px solid " + corBotaoBorda + ";" : ""}${corBotaoTexto ? "color:" + corBotaoTexto + ";" : ""}`;
        const classeBotao = `inline-block font-bold px-6 py-3 rounded-xl ${!corBotaoFundo ? "bg-white" : ""} ${!corBotaoTexto ? "text-black" : ""}`;
        const classeBotaoForm = `w-full font-bold py-3 rounded-xl ${!corBotaoFundo ? "bg-white" : ""} ${!corBotaoTexto ? "text-black" : ""}`;
        let conteudoHtml = "";
        if (bloco.tipo === "texto_midia") {
            conteudoHtml = `
                <div class="max-w-5xl mx-auto px-6 grid md:grid-cols-2 gap-10 ${itemsClasse}">
                    <div class="${bloco.props.posicaoImagem === "esquerda" ? "md:order-2" : ""} ${textAlignClasse}">
                        <h2 class="text-3xl font-bold mb-4">${bloco.props.titulo || ""}</h2>
                        <p class="text-gray-300 mb-6">${bloco.props.subtitulo || ""}</p>
                        ${bloco.props.botaoTexto ? `<a href="${bloco.props.botaoLink || "#"}" style="${estiloBotao}" class="${classeBotao}">${bloco.props.botaoTexto}</a>` : ""}
                    </div>
                    <div class="${bloco.props.posicaoImagem === "esquerda" ? "md:order-1" : ""}">
                        ${bloco.props.imagemB64 ? `<img src="${bloco.props.imagemB64}"${loadingAttr} style="${bloco.props.imagemLargura ? `width:${bloco.props.imagemLargura}px; max-width:100%;` : "width:100%;"}" class="rounded-2xl">` : ""}
                    </div>
                </div>`;
        } else if (bloco.tipo === "formulario_captura") {
            conteudoHtml = `
                <div class="max-w-md mx-auto px-6 ${textAlignClasse}">
                    <h2 class="text-2xl font-bold mb-6">${bloco.props.titulo || ""}</h2>
                    <form class="space-y-3 text-left" onsubmit="return enviarFormularioLP(event)">
                        ${(bloco.props.campos || []).map(campo => campo === "whatsapp" ? `<input type="tel" inputmode="numeric" maxlength="11" placeholder="${campo}" oninput="this.value=this.value.replace(/[^0-9]/g,'').slice(0,11)" class="w-full p-3 rounded-xl bg-white/5 border border-white/10 text-white">` : `<input type="text" placeholder="${campo}" class="w-full p-3 rounded-xl bg-white/5 border border-white/10 text-white">`).join("")}


                        <button type="submit" style="${estiloBotao}" class="${classeBotaoForm}">${bloco.props.textoBotao || "Enviar"}</button>
                    </form>
                </div>`;
        } else if (bloco.tipo === "faq") {
            const itens = bloco.props.itens || [];
            conteudoHtml = `
                <div class="max-w-3xl mx-auto px-6 ${textAlignClasse}">
                    ${bloco.props.titulo ? `<h2 class="text-3xl font-bold mb-8">${bloco.props.titulo}</h2>` : ""}
                    <div class="space-y-3 text-left">
                        ${itens.map(item => `
                            <details class="bg-white/5 border border-white/10 rounded-xl p-4">
                                <summary class="font-bold cursor-pointer">${item.pergunta || ""}</summary>
                                <p class="text-gray-300 mt-2 text-sm">${item.resposta || ""}</p>
                            </details>
                        `).join("")}
                    </div>
                </div>`;
        } else if (bloco.tipo === "galeria_imagens") {
            const imagens = bloco.props.imagens || [];
            conteudoHtml = `
                <div class="max-w-5xl mx-auto px-6 ${textAlignClasse}">
                    ${bloco.props.titulo ? `<h2 class="text-3xl font-bold mb-8">${bloco.props.titulo}</h2>` : ""}
                    <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
                        ${imagens.map(img => `<img src="${img}"${loadingAttr} class="w-full h-40 object-cover rounded-xl">`).join("")}
                    </div>
                </div>`;
        } else if (bloco.tipo === "lista_cards") {
            const cards = bloco.props.cards || [];
            conteudoHtml = `
                <div class="max-w-5xl mx-auto px-6 ${textAlignClasse}">
                    ${bloco.props.titulo ? `<h2 class="text-3xl font-bold mb-8">${bloco.props.titulo}</h2>` : ""}
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4 text-left">
                        ${cards.map(card => `
                            <div class="bg-white/5 border border-white/10 rounded-xl p-5">
                                ${card.icone ? `<div class="text-2xl mb-2">${card.icone}</div>` : ""}
                                <h3 class="font-bold mb-1">${card.titulo || ""}</h3>
                                <p class="text-gray-400 text-sm">${card.texto || ""}</p>
                            </div>
                        `).join("")}
                    </div>
                </div>`;
        } else if (bloco.tipo === "tabela_comparativo") {
            const linhas = bloco.props.linhas || [];
            conteudoHtml = `
                <div class="max-w-3xl mx-auto px-6 ${textAlignClasse}">
                    ${bloco.props.titulo ? `<h2 class="text-3xl font-bold mb-8">${bloco.props.titulo}</h2>` : ""}
                    <table class="w-full text-left border-collapse text-sm">
                        <thead>
                            <tr class="border-b border-white/10">
                                <th class="p-3"></th>
                                <th class="p-3 font-bold">${bloco.props.coluna1 || ""}</th>
                                <th class="p-3 font-bold">${bloco.props.coluna2 || ""}</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${linhas.map(linha => `
                                <tr class="border-b border-white/5">
                                    <td class="p-3 text-gray-400">${linha.label || ""}</td>
                                    <td class="p-3">${linha.valor1 || ""}</td>
                                    <td class="p-3">${linha.valor2 || ""}</td>
                                </tr>
                            `).join("")}
                        </tbody>
                    </table>
                </div>`;
        } else if (bloco.tipo === "texto_rico") {
            const paragrafos = (bloco.props.conteudo || "").split(/\n\s*\n/).filter(p => p.trim());
            conteudoHtml = `
                <div class="max-w-3xl mx-auto px-6 ${textAlignClasse}">
                    ${bloco.props.titulo ? `<h2 class="text-3xl font-bold mb-6">${bloco.props.titulo}</h2>` : ""}
                    <div class="text-gray-300 space-y-4 leading-relaxed">
                        ${paragrafos.map(p => `<p>${p}</p>`).join("")}
                    </div>
                </div>`;
        } else if (bloco.tipo === "codigo_iframe") {
            conteudoHtml = bloco.props.htmlCustom
                ? `<div class="max-w-5xl mx-auto px-6">${bloco.props.htmlCustom}</div>`
                : (bloco.props.url
                    ? `<div class="max-w-5xl mx-auto px-6"><iframe src="${bloco.props.url}" style="width:100%; height:${bloco.props.altura || 400}px; border:0;" class="rounded-xl"></iframe></div>`
                    : "");
        } else if (bloco.tipo === "carrossel_banners") {
            const banners = bloco.props.banners || [];
            const idUnico = "carrossel_" + Math.random().toString(36).slice(2);
            const slides = banners.map(b => `
                <a href="${b.link || "#"}" class="shrink-0 snap-center w-full md:w-[600px]">
                    <img src="${b.imagemB64}"${loadingAttr} class="w-full h-64 object-cover rounded-2xl">
                </a>
            `).join("");
            conteudoHtml = `<div class="max-w-5xl mx-auto px-6">${envolverCarrossel(idUnico, slides)}</div>`;
        } else if (bloco.tipo === "carrossel_produtos") {
            const ids = bloco.props.produtosIds || [];
            const produtos = [];
            for (const pid of ids) {
                const pSnap = await getDoc(doc(db, "produtos", pid));
                if (pSnap.exists()) produtos.push(pSnap.data());
            }
            const idUnico = "carrossel_" + Math.random().toString(36).slice(2);
            const slides = produtos.map(p => `
                <div class="shrink-0 snap-center w-64 bg-white/5 border border-white/10 rounded-2xl overflow-hidden">
                    ${p.imagemB64 ? `<img src="${p.imagemB64}"${loadingAttr} class="w-full h-40 object-cover">` : ""}
                    <div class="p-4">
                        <h3 class="font-bold text-sm mb-1">${p.nome || ""}</h3>
                        <p class="text-gray-400 text-xs">R$ ${p.preco || ""}</p>
                    </div>
                </div>
            `).join("");
            conteudoHtml = `<div class="max-w-5xl mx-auto px-6">${bloco.props.titulo ? `<h2 class="text-3xl font-bold mb-8 ${textAlignClasse}">${bloco.props.titulo}</h2>` : ""}${envolverCarrossel(idUnico, slides)}</div>`;
        } else if (bloco.tipo === "carrossel_cards") {
            const cards = bloco.props.cards || [];
            const idUnico = "carrossel_" + Math.random().toString(36).slice(2);
            const estilo = bloco.props.estiloImagem || "lado";
            const slides = cards.map(c => {
                if (estilo === "fundo") {
                    return `
                        <div class="shrink-0 snap-center w-64 h-72 rounded-2xl relative overflow-hidden" style="${c.imagemB64 ? `background-image:url('${c.imagemB64}');background-size:cover;background-position:center;` : "background-color:#222;"}">
                            <div class="absolute inset-0 bg-black/40"></div>
                            <div class="relative p-5 flex flex-col justify-end h-full text-white">
                                <h3 class="font-bold mb-1">${c.titulo || ""}</h3>
                                <p class="text-sm text-gray-200">${c.texto || ""}</p>
                            </div>
                        </div>
                    `;
                }
                return `
                    <div class="shrink-0 snap-center w-64 bg-white/5 border border-white/10 rounded-2xl overflow-hidden">
                        ${c.imagemB64 ? `<img src="${c.imagemB64}"${loadingAttr} class="w-full h-36 object-cover">` : ""}
                        <div class="p-4">
                            <h3 class="font-bold text-sm mb-1">${c.titulo || ""}</h3>
                            <p class="text-gray-400 text-xs">${c.texto || ""}</p>
                        </div>
                    </div>
                `;
            }).join("");
            conteudoHtml = `<div class="max-w-5xl mx-auto px-6">${bloco.props.titulo ? `<h2 class="text-3xl font-bold mb-8 ${textAlignClasse}">${bloco.props.titulo}</h2>` : ""}${envolverCarrossel(idUnico, slides)}</div>`;
        } else if (bloco.tipo === "navegacao") {
            const links = bloco.props.links || [];
            conteudoHtml = `
                <div class="max-w-6xl mx-auto px-6 flex items-center justify-between flex-wrap gap-4">
                    <span class="font-bold text-lg">${bloco.props.logoTexto || ""}</span>
                    <nav class="flex gap-6 flex-wrap">
                        ${links.map(l => `<a href="${l.href || "#"}" class="text-sm hover:opacity-70">${l.label || ""}</a>`).join("")}
                    </nav>
                </div>`;
        } else if (bloco.tipo === "rodape") {
            const links = bloco.props.links || [];
            conteudoHtml = `
                <div class="max-w-6xl mx-auto px-6 flex flex-col md:flex-row items-center justify-between gap-4 text-sm text-gray-400">
                    <p>${bloco.props.textoCopyright || ""}</p>
                    <div class="flex gap-6 flex-wrap">
                        ${links.map(l => `<a href="${l.href || "#"}" class="hover:opacity-70">${l.label || ""}</a>`).join("")}
                    </div>
                </div>`;
        } else if (bloco.tipo === "seletor_cores") {
            const opcoes = bloco.props.opcoes || [];
            conteudoHtml = `
                <div class="max-w-md mx-auto px-6 ${textAlignClasse}">
                    ${bloco.props.titulo ? `<h3 class="font-bold mb-3">${bloco.props.titulo}</h3>` : ""}
                    <div class="flex gap-3 flex-wrap ${justifyClasse}">
                        ${opcoes.map(op => `
                            <div class="flex flex-col items-center gap-1">
                                <div style="background-color:${op.hex || "#000"};" class="w-10 h-10 rounded-full border-2 border-white/20"></div>
                                <span class="text-[10px] text-gray-400">${op.nome || ""}</span>
                            </div>
                        `).join("")}
                    </div>
                </div>`;
        } else if (bloco.tipo === "breadcrumb") {
            const itens = bloco.props.itens || [];
            conteudoHtml = `
                <div class="max-w-5xl mx-auto px-6 text-xs text-gray-400">
                    ${itens.map((item, idx) => `${idx > 0 ? '<span class="mx-2">/</span>' : ""}<a href="${item.href || "#"}" class="hover:text-white">${item.label || ""}</a>`).join("")}
                </div>`;
        } else if (bloco.tipo === "forma") {
            const largura = bloco.props.largura || 120;
            const altura = bloco.props.altura || 120;
            const corForma = bloco.props.cor || "#5B3DF5";
            let estiloForma = `width:${largura}px; background-color:${corForma};`;
            if (bloco.props.tipoForma === "circulo") estiloForma += `height:${altura}px; border-radius:50%;`;
            else if (bloco.props.tipoForma === "linha") estiloForma += `height:3px;`;
            else estiloForma += `height:${altura}px; border-radius:8px;`;
            conteudoHtml = `<div class="flex ${justifyClasse} px-6"><div style="${estiloForma}"></div></div>`;
        }
        const estiloTextoBloco = d.corTexto ? `color:${d.corTexto};` : "";
        if (modoLayout === "livre") {
            const largura = bloco.largura || 600;
            const altura = bloco.altura || 220;
            const larguraTela = 1440;
            const x = Math.min(Math.max(0, bloco.x !== undefined ? bloco.x : 20), Math.max(0, larguraTela - largura));
            const y = bloco.y !== undefined ? bloco.y : 20;
            const zIndex = bloco.zIndex || 1;
            return `<section${idSecaoAttr} class="absolute rounded-lg overflow-hidden" style="left:${x}px; top:${y}px; width:${largura}px; height:${altura}px; z-index:${zIndex}; ${estiloFundo} ${estiloTextoBloco}">
                ${overlayHtml}
                <div class="relative w-full h-full overflow-hidden" style="padding-top:${Math.min(paddingTop, 24)}px; padding-bottom:${Math.min(paddingBottom, 24)}px;">${conteudoHtml}</div>
            </section>`;
        }
        return `<section${idSecaoAttr} class="relative ${visClasse}" style="${estiloFundo} ${estiloTextoBloco} padding-top:${paddingTop}px; padding-bottom:${paddingBottom}px;">
            ${overlayHtml}
            <div class="relative">${conteudoHtml}</div>
        </section>`;
    }

    function mostrarErro() {
        document.getElementById("lp-container").innerHTML = '<p class="text-gray-400 text-sm">Pagina nao encontrada.</p>';
    }

    if (segmentos.length === 0) {
        window.location.href = "login.html";
    } else if (ehDominioPadrao && segmentos.length === 2 && modoPreview) {
        setTimeout(function() {
            var c = document.getElementById("lp-container");
            if (c && c.textContent.indexOf("Carregando") !== -1) {
                c.innerHTML = '<p class="text-amber-400 text-xs px-6 text-center">Travou carregando ha mais de 8s (loja=' + segmentos[0] + ', pagina=' + segmentos[1] + ')</p>';
            }
        }, 8000);
        renderizarLandingPagePreview(segmentos[1]);
    } else if (ehDominioPadrao && segmentos.length === 2) {
        setTimeout(function() {
            var c = document.getElementById("lp-container");
            if (c && c.textContent.indexOf("Carregando") !== -1) {
                c.innerHTML = '<p class="text-amber-400 text-xs px-6 text-center">Travou carregando ha mais de 8s (loja=' + segmentos[0] + ', pagina=' + segmentos[1] + ')</p>';
            }
        }, 8000);
        renderizarLandingPage(segmentos[0], segmentos[1]);
    } else if (!ehDominioPadrao && segmentos.length === 1) {
        resolverLojaPorDominio(window.location.hostname).then(function(lojaSlug) {
            if (lojaSlug) renderizarLandingPage(lojaSlug, segmentos[0]);
            else mostrarErro();
        });
    } else {
        mostrarErro();
    }
})();
</script>
</body>
</html>
