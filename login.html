<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vide Digital | Login Premium</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght=400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="login.css">
</head>
<body>

    <div class="bg-glow"></div>

    <div id="toast-notification" class="toast hidden">
        <i id="toast-icon" class="fa-solid"></i>
        <span id="toast-message"></span>
    </div>

    <div class="login-wrapper">
        <main class="login-card">
            
            <header class="login-header">
                <div class="logo-area">
                    <i class="fa-solid fa-dna logo-icon"></i>
                    <span class="logo-text">Vide<strong class="accent">Digital</strong></span>
                </div>
                <p class="subtitle">Insira suas credenciais para acessar o painel administrativo</p>
            </header>

            <form class="login-form" id="form-login-auth">
                
                <div class="input-group">
                    <label for="email">E-mail Corporativo</label>
                    <div class="input-field-wrapper">
                        <i class="fa-regular fa-envelope input-icon"></i>
                        <input type="email" id="email" placeholder="seu@email.com" required autocomplete="email">
                    </div>
                </div>

                <div class="input-group">
                    <div class="label-row">
                        <label for="password">Chave de Acesso</label>
                        <a href="#" class="forgot-link" id="btn-forgot">Esqueceu a senha?</a>
                    </div>
                    <div class="input-field-wrapper">
                        <i class="fa-solid fa-lock input-icon"></i>
                        <input type="password" id="password" placeholder="••••••••" required>
                    </div>
                </div>

                <div class="form-options">
                    <label class="checkbox-container">
                        <input type="checkbox" id="remember-me" checked>
                        <span class="checkmark"></span>
                        Manter conectado neste dispositivo
                    </label>
                </div>

                <div class="action-buttons">
                    <button type="submit" class="btn-primary" id="btn-submit-text">
                        <span id="label-btn">Entrar no Dashboard</span>
                        <i class="fa-solid fa-arrow-right-to-bracket" id="icon-btn"></i>
                    </button>
                    
                    <button type="button" class="btn-secondary" id="btn-cadastro">
                        Solicitar Novo Acesso
                    </button>
                </div>

            </form>
        </main>
    </div>

    <script>
        document.getElementById('form-login-auth').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const labelBtn = document.getElementById('label-btn');
            const iconBtn = document.getElementById('icon-btn');
            
            // Efeito visual de carregamento avançado
            labelBtn.textContent = "Autenticando infraestrutura...";
            iconBtn.className = "fa-solid fa-circle-notch fa-spin";
            
            setTimeout(() => {
                // Validação Simples Local (Substitua pelas suas credenciais se necessário)
                if(email.trim() !== "" && password.length >= 4) {
                    showToast("Acesso autorizado! Redirecionando...", "success");
                    
                    setTimeout(() => {
                        // Altere para o nome do arquivo correto do seu painel (ex: index.html ou painel.html)
                        window.location.href = "index.html"; 
                    }, 1200);
                } else {
                    showToast("Credenciais incorretas ou inválidas.", "error");
                    labelBtn.textContent = "Entrar no Dashboard";
                    iconBtn.className = "fa-solid fa-arrow-right-to-bracket";
                }
            }, 1000);
        });

        // Eventos adicionais sem usar pop-ups chatos do navegador
        document.getElementById('btn-forgot').addEventListener('click', (e) => {
            e.preventDefault();
            showToast("Link de recuperação enviado para o e-mail cadastrado.", "success");
        });

        document.getElementById('btn-cadastro').addEventListener('click', () => {
            showToast("Solicitação enviada. Aguarde aprovação do administrador.", "info");
        });

        function showToast(message, type) {
            const toast = document.getElementById('toast-notification');
            const icon = document.getElementById('toast-icon');
            const msgSpan = document.getElementById('toast-message');
            
            toast.className = `toast ${type}`;
            msgSpan.textContent = message;
            
            if(type === 'success') icon.className = "fa-solid fa-circle-check";
            if(type === 'error') icon.className = "fa-solid fa-circle-exclamation";
            if(type === 'info') icon.className = "fa-solid fa-circle-info";
            
            toast.classList.remove('hidden');
            
            setTimeout(() => {
                toast.classList.add('hidden');
            }, 3500);
        }
    </script>
</body>
</html>
