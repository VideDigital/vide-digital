<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VideDigital - Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* --- CSS DAS NOTIFICAÇÕES PREMIUM (TOAST) --- */
    .toast-container {
        position: fixed;
        top: 20px;
        right: 20px;
        z-index: 10000;
        display: flex;
        flex-direction: column;
        gap: 10px;
    }
    .custom-toast {
        background-color: #121214;
        color: #ffffff;
        padding: 14px 20px;
        border-radius: 12px;
        border-left: 4px solid #ff4444; /* Vermelho para Erro por padrão */
        box-shadow: 0px 8px 24px rgba(0, 0, 0, 0.6);
        font-family: system-ui, -apple-system, sans-serif;
        font-size: 14px;
        font-weight: 500;
        min-width: 320px;
        max-width: 420px;
        display: flex;
        align-items: center;
        animation: slideInToast 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards, 
                   fadeOutToast 0.3s ease 4.7s forwards;
    }
    /* Variante para mensagens de Sucesso */
    .custom-toast.sucesso {
        border-left-color: #00f2fe; /* Ciano da VideDigital */
    }
    @keyframes slideInToast {
        from { transform: translateX(120%); opacity: 0; }
        to { transform: translateX(0); opacity: 1; }
    }
    @keyframes fadeOutToast {
        from { transform: translateX(0); opacity: 1; }
        to { transform: translateX(120%); opacity: 0; }
    }
  </style>
</head>
<body class="bg-[#09090b] text-white flex min-h-screen items-center justify-center p-4">

  <div class="w-full max-w-md bg-[#121214] border border-[#27272a] rounded-2xl p-8 shadow-2xl space-y-6">
    <div class="text-center space-y-2">
      <h2 id="auth-title" class="text-3xl font-bold tracking-tight text-[#00f2fe]">VideDigital</h2>
      <p id="auth-subtitle" class="text-sm text-gray-400">Insira suas credenciais para acessar o painel</p>
    </div>

    <form class="space-y-4">
      <div id="container-nome" class="hidden">
        <label class="text-xs font-semibold text-gray-400 uppercase tracking-wider">Nome da Loja</label>
        <input type="text" id="auth-nome" class="w-full mt-1 bg-[#18181b] border border-[#27272a] rounded-xl p-3 text-white focus:outline-none focus:border-[#00f2fe]" placeholder="Ex: Minha Vitrine">
      </div>

      <div>
        <label class="text-xs font-semibold text-gray-400 uppercase tracking-wider">E-mail</label>
        <input type="email" id="auth-email" required class="w-full mt-1 bg-[#18181b] border border-[#27272a] rounded-xl p-3 text-white focus:outline-none focus:border-[#00f2fe]" placeholder="seu@email.com">
      </div>

      <div>
        <div class="flex justify-between items-center">
          <label class="text-xs font-semibold text-gray-400 uppercase tracking-wider">Senha</label>
          <a href="#" class="text-xs text-[#00f2fe] hover:underline">Esqueceu a senha?</a>
        </div>
        <input type="password" id="auth-senha" required class="w-full mt-1 bg-[#18181b] border border-[#27272a] rounded-xl p-3 text-white focus:outline-none focus:border-[#00f2fe]" placeholder="••••••••">
      </div>

      <div class="flex items-center space-x-2 py-1">
        <input type="checkbox" id="manter-conectado" checked class="w-4 h-4 rounded bg-[#18181b] border-[#27272a] text-[#00f2fe] focus:ring-0">
        <label for="manter-conectado" class="text-xs text-gray-400 select-none">Manter conectado</label>
      </div>

      <button type="submit" id="btn-principal" class="w-full bg-[#00f2fe] hover:bg-[#00d8e4] text-black font-bold p-3.5 rounded-xl transition shadow-lg shadow-[#00f2fe]/10">
        Entrar no Painel
      </button>

      <button type="button" id="btn-alternar" class="w-full bg-transparent border border-[#27272a] hover:bg-[#18181b] text-white font-medium p-3.5 rounded-xl transition text-sm">
        Solicitar Cadastro
      </button>
    </form>
  </div>

  <script type="module">
    import { auth, db } from "./firebase-init.js";
    import { signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const form = document.querySelector("form");
    const title = document.getElementById("auth-title");
    const subtitle = document.getElementById("auth-subtitle");
    const containerNome = document.getElementById("container-nome");
    const nomeInput = document.getElementById("auth-nome");
    const emailInput = document.getElementById("auth-email");
    const senhaInput = document.getElementById("auth-senha");
    const btnPrincipal = document.getElementById("btn-principal");
    const btnAlternar = document.getElementById("btn-alternar");

    let modoLogin = true;

    // Função para criar os alertas elegantes na tela de forma dinâmica
    function mostrarNotificacao(mensagem, tipo = 'erro') {
        let container = document.querySelector('.toast-container');
        if (!container) {
            container = document.createElement('div');
            container.className = 'toast-container';
            document.body.appendChild(container);
        }
        const toast = document.createElement('div');
        toast.className = `custom-toast ${tipo}`;
        toast.innerText = mensaje || mensagem;
        container.appendChild(toast);
        setTimeout(() => {
            toast.remove();
            if (container.children.length === 0) container.remove();
        }, 5000);
    }

    btnAlternar.addEventListener("click", () => {
      modoLogin = !modoLogin;
      if (!modoLogin) {
        title.innerText = "Criar Conta";
        subtitle.innerText = "Preencha os dados abaixo para solicitar seu cadastro";
        containerNome.classList.remove("hidden");
        btnPrincipal.innerText = "Cadastrar Conta";
        btnAlternar.innerText = "Já tenho uma conta (Fazer Login)";
      } else {
        title.innerText = "VideDigital";
        subtitle.innerText = "Insira suas credenciais para acessar o painel";
        containerNome.classList.add("hidden");
        btnPrincipal.innerText = "Entrar no Painel";
        btnAlternar.innerText = "Solicitar Cadastro";
      }
    });

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      const email = emailInput.value.trim();
      const password = senhaInput.value;
      const nomeLoja = nomeInput.value.trim();

      if (modoLogin) {
        try {
          btnPrincipal.innerText = "Autenticando...";
          btnPrincipal.disabled = true;
          
          // Realiza o login na autenticação do Firebase
          const userCredential = await signInWithEmailAndPassword(auth, email, password);
          const user = userCredential.user;

          // Busca o documento para verificar se você marcou como aprovado no Firestore
          const docSnap = await getDoc(doc(db, "usuarios", user.uid));

          if (docSnap.exists()) {
            const dados = docSnap.data();
            
            // Valida o status do cliente
            if (dados.status === "aprovado") {
              mostrarNotificacao("Acesso autorizado! Entrando...", "sucesso");
              setTimeout(() => { window.location.href = "dashboard.html"; }, 1500);
            } else {
              // Se estiver como "pendente" ou não revisado, chuta a sessão para fora imediatamente
              await signOut(auth);
              mostrarNotificacao("Seu cadastro está pendente de aprovação pelo administrador.", "erro");
              btnPrincipal.innerText = "Entrar no Painel";
              btnPrincipal.disabled = false;
            }
          } else {
            await signOut(auth);
            mostrarNotificacao("Conta não localizada no banco de dados corporativo.", "erro");
            btnPrincipal.innerText = "Entrar no Painel";
            btnPrincipal.disabled = false;
          }
        } catch (error) {
          console.error(error);
          mostrarNotificacao("Erro na autenticação. Verifique seu e-mail e senha.", "erro");
          btnPrincipal.innerText = "Entrar no Painel";
          btnPrincipal.disabled = false;
        }
      } else {
        try {
          btnPrincipal.innerText = "Enviando Solicitação...";
          btnPrincipal.disabled = true;
          
          const userCredential = await createUserWithEmailAndPassword(auth, email, password);
          const user = userCredential.user;

          const baseSlug = nomeLoja ? nomeLoja.toLowerCase().replace(/[^a-z0-9]/g, "-") : "loja";
          const randomId = Math.floor(1000 + Math.random() * 9000);
          const finalSlug = `${baseSlug}-${randomId}`;

          // Cria o registro no banco iniciando rigidamente como PENDENTE
          await setDoc(doc(db, "usuarios", user.uid), {
            uid: user.uid,
            email: email,
            nomeLoja: nomeLoja || "Minha Vitrine",
            slug: finalSlug,
            status: "pendente", // Inicializa bloqueado
            dataSolicitacao: new Date().toLocaleDateString("pt-BR"),
            pixelFacebook: "",
            googleAnalytics: "",
            dominioPersonalizado: "",
            tema: "Ultra Dark",
            corFundo: "#09090b",
            corDestaque: "#00f2fe",
            corCards: "#121214",
            corTextoLoja: "#ffffff"
          });

          mostrarNotificacao("Solicitação enviada com sucesso! Aguarde liberação do administrador.", "sucesso");
          await signOut(auth); // Desloga para garantir que ele passe pela verificação ao tentar logar
          
          // Resbalece tela de login padrão
          setTimeout(() => {
             modoLogin = true;
             title.innerText = "VideDigital";
             subtitle.innerText = "Insira suas credenciais para acessar o painel";
             containerNome.classList.add("hidden");
             btnPrincipal.innerText = "Entrar no Painel";
             btnPrincipal.disabled = false;
             btnAlternar.innerText = "Solicitar Cadastro";
             form.reset();
          }, 3000);

        } catch (error) {
          console.error(error);
          mostrarNotificacao("Erro ao processar solicitação: Senha fraca ou e-mail já existente.", "erro");
          btnPrincipal.innerText = "Cadastrar Conta";
          btnPrincipal.disabled = false;
        }
      }
    });
  </script>
</body>
</html>
