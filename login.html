<!DOCTYPE html>
<html lang="pt-br" class="h-full bg-[#030712]">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VideDigital | Acesso Restrito</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .glass-card { background: rgba(13, 13, 22, 0.4); backdrop-filter: blur(24px); border: 1px solid rgba(255, 255, 255, 0.04); }
        .glass-input { background: rgba(6, 6, 10, 0.8); border: 1px solid rgba(255, 255, 255, 0.05); transition: all 0.2s ease; }
        .glass-input:focus { border-color: #00f2fe; box-shadow: 0 0 20px rgba(0, 242, 254, 0.1); }
    </style>
</head>
<body class="h-full flex items-center justify-center p-4">

    <div id="toast-container" class="fixed top-6 right-6 z-50 space-y-3 pointer-events-none"></div>

    <div class="w-full max-w-md glass-card p-8 rounded-3xl space-y-6 shadow-2xl relative overflow-hidden">
        
        <div class="absolute -top-10 -right-10 h-32 w-32 rounded-full bg-[#00f2fe]/10 blur-3xl"></div>

        <div class="text-center space-y-2">
            <div class="mx-auto h-10 w-10 rounded-xl bg-gradient-to-tr from-[#00f2fe] to-[#4facfe] flex items-center justify-center shadow-[0_0_20px_rgba(0,242,254,0.4)]">
                <span class="text-black font-extrabold text-sm">V</span>
            </div>
            <h2 class="text-xl font-black tracking-tight text-white pt-2">Acesse seu Painel</h2>
            <p class="text-xs text-gray-400">Entre com suas credenciais para gerenciar suas vitrines.</p>
        </div>

        <form id="login-form" class="space-y-4">
            <div class="space-y-1.5">
                <label class="text-[10px] font-bold text-gray-400 uppercase tracking-wider block">E-mail Corporativo</label>
                <input type="email" id="login-email" required class="w-full glass-input rounded-xl p-3.5 text-sm text-white outline-none placeholder-gray-600" placeholder="seu@email.com">
            </div>

            <div class="space-y-1.5">
                <label class="text-[10px] font-bold text-gray-400 uppercase tracking-wider block">Senha de Acesso</label>
                <input type="password" id="login-senha" required class="w-full glass-input rounded-xl p-3.5 text-sm text-white outline-none placeholder-gray-600" placeholder="••••••••">
            </div>

            <div class="flex items-center justify-between pt-1 text-xs">
                <label class="flex items-center gap-2 text-gray-400 cursor-pointer select-none">
                    <input type="checkbox" id="lembrar-me" class="rounded border-white/10 bg-black checked:bg-[#00f2fe]"> Lembrar acesso
                </label>
                <button type="button" id="btn-recuperar" class="text-[#00f2fe] hover:underline font-medium">Esqueceu a senha?</button>
            </div>

            <button type="submit" class="w-full bg-gradient-to-r from-[#00f2fe] to-[#4facfe] text-black font-black text-xs uppercase tracking-widest py-4 rounded-xl shadow-[0_4px_30px_rgba(0,242,254,0.15)] hover:scale-[1.01] active:scale-[0.99] transition-all">
                Autenticar Entrada
            </button>
        </form>

        <div class="text-center pt-2">
            <p class="text-xs text-gray-500">Não tem uma conta? <button id="btn-registrar-view" class="text-white hover:underline font-semibold">Criar Conta</button></p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, setPersistence, browserLocalPersistence, browserSessionPersistence } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        // Configuração central do Firebase (Certifique-se de que é a mesma usada no dashboard.html)
        const firebaseConfig = {
            apiKey: "AIzaSyAs8...", 
            authDomain: "videdigital-ad.firebaseapp.com",
            projectId: "videdigital-ad",
            storageBucket: "videdigital-ad.appspot.com",
            messagingSenderId: "9823749283",
            appId: "1:9823749283:web:abcd1234"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        const form = document.getElementById("login-form");
        const emailInput = document.getElementById("login-email");
        const senhaInput = document.getElementById("login-senha");
        const lembrarCheckbox = document.getElementById("lembrar-me");

        // 1. EVENTO DE LOGIN (AUTENTICAÇÃO)
        form.addEventListener("submit", async (e) => {
            e.preventDefault();
            const email = emailInput.value.trim();
            const senha = senhaInput.value;

            try {
                // Define se a sessão vai durar mesmo fechando o navegador ou só enquanto a aba estiver aberta
                const persistenceType = lembrarCheckbox.checked ? browserLocalPersistence : browserSessionPersistence;
                await setPersistence(auth, persistenceType);

                // Efetua o login no Firebase
                await signInWithEmailAndPassword(auth, email, senha);
                
                showToast("Autenticado com sucesso! Redirecionando...", "success");
                
                // Redireciona para o arquivo do Dashboard
                setTimeout(() => {
                    window.location.href = "index.html"; // Mude para "dashboard.html" se o seu arquivo ainda tiver esse nome no repositório!
                }, 1000);

            } catch (error) {
                console.error("Erro ao fazer login:", error);
                let mensagemErro = "Falha na autenticação. Verifique os dados.";
                
                if (error.code === "auth/invalid-credential" || error.code === "auth/wrong-password" || error.code === "auth/user-not-found") {
                    mensagemErro = "E-mail ou senha incorretos.";
                } else if (error.code === "auth/invalid-email") {
                    mensagemErro = "Formato de e-mail inválido.";
                }
                
                showToast(mensagemErro, "error");
            }
        });

        // 2. ALTERNATIVA: CRIAR CONTA RÁPIDA (Se precisar registrar um e-mail novo no banco)
        document.getElementById("btn-registrar-view").addEventListener("click", async () => {
            const email = emailInput.value.trim();
            const senha = senhaInput.value;

            if (!email || senha.length < 6) {
                showToast("Para registrar, preencha o e-mail e uma senha de no mínimo 6 dígitos.", "error");
                return;
            }

            if (confirm(`Deseja criar uma nova conta de administrador com o e-mail: ${email}?`)) {
                try {
                    await createUserWithEmailAndPassword(auth, email, senha);
                    showToast("Conta criada com sucesso! Entrando...", "success");
                    setTimeout(() => { window.location.href = "index.html"; }, 1200);
                } catch (err) {
                    console.error(err);
                    showToast("Erro ao registrar: " + err.message, "error");
                }
            }
        });

        // FUNÇÃO AUXILIAR DE NOTIFICAÇÕES (TOAST)
        function showToast(text, type = "success") {
            const container = document.getElementById("toast-container");
            const toast = document.createElement("div");
            toast.className = `p-4 rounded-xl text-xs font-bold shadow-2xl transition-all duration-300 transform translate-y-2 opacity-0 flex items-center gap-2 text-black ${
                type === 'error' ? 'bg-red-400' : 'bg-[#00f2fe]'
            }`;
            toast.innerHTML = `<span>${type === 'error' ? '❌' : '⚡'}</span> ${text}`;
            container.appendChild(toast);
            setTimeout(() => { toast.classList.remove("opacity-0", "translate-y-2"); }, 50);
            setTimeout(() => {
                toast.classList.add("opacity-0", "translate-y-[-2px]");
                setTimeout(() => toast.remove(), 300);
            }, 3500);
        }
    </script>
</body>
</html>
