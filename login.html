<!DOCTYPE html>
<html lang="pt-br" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acessar VideDigital | Painel de Gestão</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .spinner { border: 2px solid rgba(0,0,0,0.1); border-top: 2px solid #000; border-radius: 50%; width: 18px; height: 18px; animation: spin 0.8s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="h-full bg-[#09090b] flex items-center justify-center p-4">

    <!-- Card Principal -->
    <div class="w-full max-w-md bg-[#121214] border border-[#27272a] rounded-3xl p-8 shadow-2xl relative overflow-hidden">
        
        <!-- Header -->
        <div class="text-center mb-8">
            <h1 id="ui-title" class="text-3xl font-bold text-white tracking-tight">Login <span class="text-[#00f2fe]">VideDigital</span></h1>
            <p id="ui-subtitle" class="text-gray-400 mt-2 text-sm">Gerencie seu ecossistema digital com precisão.</p>
        </div>

        <!-- Área de Erro (Oculta por padrão) -->
        <div id="error-container" class="hidden mb-6 fade-in">
            <div class="flex items-center gap-3 p-4 text-sm text-red-400 border border-red-500/20 bg-red-950/20 rounded-xl">
                <span id="error-text"></span>
            </div>
        </div>

        <!-- Formulário -->
        <form id="auth-form" class="space-y-5">
            <div id="field-nome" class="hidden space-y-2">
                <label class="text-xs font-semibold text-gray-500 uppercase">Nome da sua Loja/Projeto</label>
                <input type="text" id="input-nome" class="w-full bg-[#18181b] border border-[#27272a] rounded-xl p-3 text-white focus:border-[#00f2fe] focus:ring-1 focus:ring-[#00f2fe] outline-none transition-all" placeholder="Ex: Boutique Digital">
            </div>
            
            <div class="space-y-2">
                <label class="text-xs font-semibold text-gray-500 uppercase">E-mail Corporativo</label>
                <input type="email" id="input-email" required class="w-full bg-[#18181b] border border-[#27272a] rounded-xl p-3 text-white focus:border-[#00f2fe] focus:ring-1 focus:ring-[#00f2fe] outline-none transition-all" placeholder="voce@exemplo.com">
            </div>

            <div class="space-y-2">
                <label class="text-xs font-semibold text-gray-500 uppercase">Senha</label>
                <input type="password" id="input-senha" required class="w-full bg-[#18181b] border border-[#27272a] rounded-xl p-3 text-white focus:border-[#00f2fe] focus:ring-1 focus:ring-[#00f2fe] outline-none transition-all" placeholder="••••••••">
            </div>

            <button type="submit" id="btn-submit" class="w-full bg-[#00f2fe] hover:bg-[#00d8e4] text-black font-bold p-4 rounded-xl transition-all flex items-center justify-center gap-2">
                <span id="btn-text">Entrar no Painel</span>
            </button>
        </form>

        <!-- Toggle -->
        <div class="mt-6 text-center">
            <button type="button" id="btn-toggle" class="text-gray-500 hover:text-[#00f2fe] text-sm font-medium transition-colors">
                Solicitar acesso a nova conta
            </button>
        </div>
    </div>

    <!-- Script de Autenticação -->
    <script type="module">
        import { auth, db } from "./firebase-init.js";
        import { signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const form = document.getElementById("auth-form");
        const btnSubmit = document.getElementById("btn-submit");
        const btnText = document.getElementById("btn-text");
        const btnToggle = document.getElementById("btn-toggle");
        const errorContainer = document.getElementById("error-container");
        const errorText = document.getElementById("error-text");
        
        let isLogin = true;

        // Feedback de Erro Profissional
        function showError(msg) {
            errorText.innerText = msg;
            errorContainer.classList.remove("hidden");
            btnSubmit.disabled = false;
            btnText.innerText = isLogin ? "Entrar no Painel" : "Solicitar Acesso";
        }

        // Alternar entre Login e Cadastro
        btnToggle.addEventListener("click", () => {
            isLogin = !isLogin;
            errorContainer.classList.add("hidden");
            document.getElementById("field-nome").classList.toggle("hidden", isLogin);
            document.getElementById("ui-title").innerHTML = isLogin ? 'Login <span class="text-[#00f2fe]">VideDigital</span>' : 'Cadastro <span class="text-[#00f2fe]">VideDigital</span>';
            btnText.innerText = isLogin ? "Entrar no Painel" : "Solicitar Acesso";
            btnToggle.innerText = isLogin ? "Solicitar acesso a nova conta" : "Já tenho uma conta";
        });

        // Evento de Submit
        form.addEventListener("submit", async (e) => {
            e.preventDefault();
            errorContainer.classList.add("hidden");
            btnSubmit.disabled = true;
            btnText.innerHTML = '<div class="spinner"></div>';

            const email = document.getElementById("input-email").value;
            const senha = document.getElementById("input-senha").value;
            const nomeLoja = document.getElementById("input-nome").value;

            try {
                if (isLogin) {
                    const userCredential = await signInWithEmailAndPassword(auth, email, senha);
                    const userSnap = await getDoc(doc(db, "usuarios", userCredential.user.uid));

                    if (userSnap.exists() && userSnap.data().status === "aprovado") {
                        window.location.href = "dashboard.html";
                    } else {
                        showError("Acesso pendente: Aguarde a liberação do administrador.");
                    }
                } else {
                    const userCredential = await createUserWithEmailAndPassword(auth, email, senha);
                    await setDoc(doc(db, "usuarios", userCredential.user.uid), {
                        email, nomeLoja, status: "pendente", criadoEm: new Date().toISOString()
                    });
                    showError("Solicitação enviada! Você será notificado quando aprovado.");
                }
            } catch (err) {
                showError("Erro: Verifique seus dados ou conexão.");
            }
        });
    </script>
</body>
</html>
