<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vide Digital | Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght=400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="login.css">
</head>
<body>

    <div class="bg-glow"></div>

    <div class="login-wrapper">
        <main class="login-card">
            
            <header class="login-header">
                <div class="logo-area">
                    <i class="fa-solid fa-dna logo-icon"></i>
                    <span class="logo-text">Vide<strong class="accent">Digital</strong></span>
                </div>
                <p class="subtitle">Insira as suas credenciais para aceder ao painel</p>
            </header>

            <form class="login-form">
                
                <div class="input-group">
                    <label for="email">E-mail</label>
                    <div class="input-field-wrapper">
                        <i class="fa-regular fa-envelope input-icon"></i>
                        <input type="email" id="email" placeholder="seu@email.com" required autocomplete="email">
                    </div>
                </div>

                <div class="input-group">
                    <div class="label-row">
                        <label for="password">Senha</label>
                        <a href="#" class="forgot-link">Esqueceu-se da senha?</a>
                    </div>
                    <div class="input-field-wrapper">
                        <i class="fa-solid fa-lock input-icon"></i>
                        <input type="password" id="password" placeholder="••••••••" required>
                    </div>
                </div>

                <div class="form-options">
                    <label class="checkbox-container">
                        <input type="checkbox" checked>
                        <span class="checkmark"></span>
                        Manter conectado
                    </label>
                </div>

                <div class="action-buttons">
                    <button type="submit" class="btn-primary">
                        <span>Entrar no Dashboard</span>
                        <i class="fa-solid fa-arrow-right-to-bracket"></i>
                    </button>
                    
                    <button type="button" class="btn-secondary">
                        Solicitar Cadastro
                    </button>
                </div>

            </form>
        </main>
    </div>

</body>
</html>
