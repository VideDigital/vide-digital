<!DOCTYPE html>
<html lang="pt-br" class="h-full antialiased">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acessar VideDigital | Enterprise SaaS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes gradient-move { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        .mesh-gradient { background: radial-gradient(circle at 50% 50%, #061e2a 0%, #020617 50%, #000 100%); background-size: 200% 200%; animation: gradient-move 15s ease infinite; }
        .glass-card { background: rgba(18, 18, 20, 0.7); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .spinner { border: 2px solid rgba(255,255,255,0.1); border-top: 2px solid #00f2fe; border-radius: 50%; width: 20px; height: 20px; animation: spin 0.8s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="h-full mesh-gradient text-gray-200">

    <div class="h-full flex">
        <!-- Coluna Esquerda: Branding & Valor -->
        <div class="hidden lg:flex flex-col justify-between w-1/2 p-12 relative overflow-hidden">
            <div class="absolute inset-0 bg-[url('https://grainy-gradients.vercel.app/noise.svg')] opacity-20"></div>
            <div class="relative z-10">
                <h2 class="text-4xl font-bold tracking-tighter text-white">Vide<span class="text-[#00f2fe]">Digital</span></h2>
            </div>
            <div class="relative z-10 space-y-4">
                <h1 class="text-6xl font-bold leading-tight">Domine a gestão do seu <br><span class="text-[#00f2fe]">ecossistema digital.</span></h1>
                <p class="text-gray-400 text-lg max-w-lg">Plataforma de alta performance para gestores de tráfego e criadores. Autenticação segura, integração total com seus ativos.</p>
            </div>
            <div class="relative z-10 text-sm text-gray-500">© 2026 VideDigital Systems Inc.</div>
        </div>

        <!-- Coluna Direita: Painel de Acesso -->
        <div class="w-full lg:w-1/2 flex items-center justify-center p-6">
            <div class="glass-card w-full max-w-[440px] p-10 rounded-3xl shadow-[0_0_80px_rgba(0,0,0,0.5)]">
                
                <div class="mb-8">
                    <h2 id="ui-title" class="text-2xl font-bold text-white">Acessar Painel</h2>
                    <p class="text-gray-500 text-sm mt-1">Bem-vindo de volta ao seu centro de comando.</p>
                </div>

                <div id="error-container" class="hidden mb-6 p-4 rounded-xl border border-red-500/20 bg-red-950/20 text-red-400 text-sm">
                    <span id="error-text"></span>
                </div>

                <form id="auth-form" class="space-y-4">
                    <div id="field-nome" class="hidden space-y-2">
                        <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Nome do Projeto</label>
                        <input type="text" id="input-nome" class="w-full bg-[#09090b] border border-white/5 rounded-lg p-3 text-white focus:border-[#00f2fe] outline-none transition-all">
                    </div>
                    
                    <div class="space-y-2">
                        <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">E-mail Corporativo</label>
                        <input type="email" id="input-email" required class="w-full bg-[#09090b] border border-white/5 rounded-lg p-3 text-white focus:border-[#00f2fe] outline-none transition-all" placeholder="nome@empresa.com">
                    </div>

                    <div class="space-y-2">
                        <div class="flex justify-between">
                            <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Senha</label>
                        </div>
                        <input type="password" id="input-senha" required class="w-full bg-[#09090b] border border-white/5 rounded-lg p-3 text-white focus:border-[#00f2fe] outline-none transition-all" placeholder="••••••••">
                    </div>

                    <button type="submit" id="btn-submit" class="w-full bg-white hover:bg-gray-100 text-black font-bold py-3.5 rounded-lg transition-all transform hover:scale-[1.01] active:scale-95 flex items-center justify-center gap-2">
                        <span id="btn-text">Entrar no Sistema</span>
                    </button>
                </form>

                <div class="mt-8 text-center border-t border-white/5 pt-6">
                    <button type="button" id="btn-toggle" class="text-gray-500 hover:text-[#00f2fe] text-xs font-medium uppercase tracking-widest transition-colors">
                        Solicitar acesso a nova conta
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        // [A lógica Firebase permanece a mesma, apenas ajustada para o novo DOM]
        import { auth, db } from "./firebase-init.js";
        import { signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const form = document.getElementById("auth-form");
        const btnSubmit = document.getElementById("btn-submit");
        const btnText = document.getElementById("btn-text");
        const btnToggle = document.getElementById("btn-toggle");
        const errorContainer = document.getElementById("error-container");
        const errorText = document.getElementById("error-text");
        let isLogin = true;

        function showError(msg) {
            errorText.innerText = msg;
            errorContainer.classList.remove("hidden");
            btnSubmit.disabled = false;
            btnText.innerText = isLogin ? "Entrar no Sistema" : "Solicitar Acesso";
        }

        btnToggle.addEventListener("click", () => {
            isLogin = !isLogin;
            errorContainer.classList.add("hidden");
            document.getElementById("field-nome").classList.toggle("hidden", isLogin);
            document.getElementById("ui-title").innerText = isLogin ? 'Acessar Painel' : 'Criar Nova Conta';
            btnText.innerText = isLogin ? "Entrar no Sistema" : "Solicitar Acesso";
            btnToggle.innerText = isLogin ? "Solicitar acesso a nova conta" : "Já tenho uma conta";
        });

        form.addEventListener("submit", async (e) => {
            e.preventDefault();
            errorContainer.classList.add("hidden");
            btnSubmit.disabled = true;
            btnText.innerHTML = '<div class="spinner"></div>';

            const email = document.getElementById("input-email").value;
            const senha = document.getElementById("input-senha").value;
            const nomeLoja = document.getElementById("input-nome").value;

            try {
                if (isLogin) {
                    const userCredential = await signInWithEmailAndPassword(auth, email, senha);
                    const userSnap = await getDoc(doc(db, "usuarios", userCredential.user.uid));
                    if (userSnap.exists() && userSnap.data().status === "aprovado") {
                        window.location.href = "dashboard.html";
                    } else {
                        showError("Acesso pendente: Aguarde liberação do administrador.");
                    }
                } else {
                    const userCredential = await createUserWithEmailAndPassword(auth, email, senha);
                    await setDoc(doc(db, "usuarios", userCredential.user.uid), {
                        email, nomeLoja, status: "pendente", criadoEm: new Date().toISOString()
                    });
                    showError("Solicitação enviada! Aguarde a aprovação.");
                }
            } catch (err) {
                showError("Erro: Verifique suas credenciais.");
            }
        });
    </script>
</body>
</html>
