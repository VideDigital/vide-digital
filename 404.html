<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Redirecionando...</title>
<script>
    var ehDominioPadrao = window.location.hostname === "videdigital.github.io";
    var base = ehDominioPadrao ? "/vide-digital/" : "/";
    var caminhoAtual = window.location.pathname;
    var extra = caminhoAtual.indexOf(base) === 0 ? caminhoAtual.slice(base.length) : caminhoAtual.replace(/^\//, "");
    var queryOriginal = window.location.search ? window.location.search.substring(1) + "&" : "";
    var destino = base + "index.html?" + queryOriginal + "p=" + encodeURIComponent(extra) + window.location.hash;
    window.location.replace(destino);
</script>
</head>
<body></body>
</html>
