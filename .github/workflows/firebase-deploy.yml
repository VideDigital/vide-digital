# Fluxo Spark: publica SOMENTE firestore:rules, firestore:indexes e as
# regras do Storage. Nunca publica Cloud Functions, Cloud Run ou qualquer
# recurso que exija o plano Blaze/faturamento — decisão definitiva do
# projeto (ver docs/FIREBASE_SPARK_ARCHITECTURE.md).
name: Deploy Firebase Spark

on:
  workflow_dispatch:
    inputs:
      project_id:
        description: ID real do projeto Firebase de produção
        required: true
        type: string
      confirm_production:
        description: Digite DEPLOY para confirmar a publicação em produção
        required: true
        type: string

permissions:
  contents: read
  id-token: write

concurrency:
  group: firebase-production-backend-deploy
  cancel-in-progress: false

jobs:
  validate-and-test:
    name: Validar solicitação e executar testes
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Validar branch e confirmação de produção
        shell: bash
        env:
          PROJECT_ID: ${{ inputs.project_id }}
          CONFIRM_PRODUCTION: ${{ inputs.confirm_production }}
        run: |
          set -euo pipefail

          if [[ "${GITHUB_EVENT_NAME}" != "workflow_dispatch" ]]; then
            echo "Erro: este workflow aceita somente execução manual."
            exit 1
          fi

          if [[ "${GITHUB_REF}" != "refs/heads/main" ]]; then
            echo "Erro: execute este workflow somente a partir da branch main."
            exit 1
          fi

          if [[ -z "${PROJECT_ID//[[:space:]]/}" ]]; then
            echo "Erro: project_id é obrigatório."
            exit 1
          fi

          NORMALIZED_PROJECT_ID="$(printf '%s' "${PROJECT_ID}" | tr '[:upper:]' '[:lower:]')"
          if [[ "${NORMALIZED_PROJECT_ID}" == *demo* ]]; then
            echo "Erro: projetos com 'demo' no ID não podem receber deploy de produção."
            exit 1
          fi

          if [[ ! "${PROJECT_ID}" =~ ^[a-z][a-z0-9-]{4,28}[a-z0-9]$ ]]; then
            echo "Erro: project_id não possui o formato esperado de um ID de projeto Google Cloud."
            exit 1
          fi

          if [[ "${PROJECT_ID}" != "vide-digital-saas" ]]; then
            echo "Erro: o frontend de produção usa o projeto vide-digital-saas."
            exit 1
          fi

          if [[ "${CONFIRM_PRODUCTION}" != "DEPLOY" ]]; then
            echo "Erro: confirm_production deve ser exatamente DEPLOY."
            exit 1
          fi

      - name: Checkout da main
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Configurar pnpm (versão fixa do packageManager)
        uses: pnpm/action-setup@v6
        with:
          version: "11.9.0"

      # pnpm 11.9.0 exige Node >= 22.13 — usar Node 20 aqui faz o próprio
      # pnpm abortar ("This version of pnpm requires at least Node.js
      # v22.13"). Precisa ser a MESMA versão nos dois jobs (validate-and-test
      # e deploy) pra não haver divergência de comportamento entre validar e
      # publicar.
      - name: Configurar Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      # Precisa vir antes de qualquer teste: test:rules e
      # test:frontend:emulator sobem o Firestore Emulator, que roda em Java.
      - name: Configurar Java 21 para o Firestore Emulator
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Verificar versões do ambiente
        run: |
          node --version
          pnpm --version
          java -version

      - name: Instalar dependências sem alterar o lockfile
        run: pnpm install --frozen-lockfile

      - name: Verificar sintaxe do projeto
        run: pnpm run check

      - name: Testar Central de IA
        run: pnpm run test:central-ia

      - name: Testar Studio (editor de Landing Pages)
        run: pnpm run test:studio

      # test:functions roda só lógica pura (validadores em functions/src/shared)
      # — nenhuma Function é implantada nem exigida em produção (plano Spark).
      - name: Testar validadores compartilhados
        run: pnpm run test:functions

      - name: Testar regras no Emulator Suite
        run: pnpm run test:rules

      - name: Smoke test do frontend no Emulator Suite
        run: pnpm run test:frontend:emulator

  deploy:
    name: Publicar Rules, Storage e índices (Spark)
    needs: validate-and-test
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout da main validada
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Configurar pnpm (versão fixa do packageManager)
        uses: pnpm/action-setup@v6
        with:
          version: "11.9.0"

      - name: Configurar Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Instalar dependências sem alterar o lockfile
        run: pnpm install --frozen-lockfile

      # Aceita dois métodos, nesta ordem de preferência:
      # 1. Workload Identity Federation (secrets GCP_WORKLOAD_IDENTITY_PROVIDER
      #    + GCP_SERVICE_ACCOUNT) — sem chave de longa duração;
      # 2. Chave JSON no secret FIREBASE_SERVICE_ACCOUNT.
      # Sem nenhum dos dois, falha AQUI com instrução clara (nunca marca
      # sucesso sem publicar) e sem exibir nenhum valor de segredo.
      - name: Detectar método de autenticação disponível
        id: auth-method
        shell: bash
        env:
          HAS_WIF_PROVIDER: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER != '' }}
          HAS_WIF_SA: ${{ secrets.GCP_SERVICE_ACCOUNT != '' }}
          HAS_SA_KEY: ${{ secrets.FIREBASE_SERVICE_ACCOUNT != '' }}
        run: |
          set -euo pipefail
          if [[ "${HAS_WIF_PROVIDER}" == "true" && "${HAS_WIF_SA}" == "true" ]]; then
            echo "method=wif" >> "${GITHUB_OUTPUT}"
            echo "Método detectado: Workload Identity Federation."
          elif [[ "${HAS_SA_KEY}" == "true" ]]; then
            echo "method=sa-key" >> "${GITHUB_OUTPUT}"
            echo "Método detectado: chave de conta de serviço (FIREBASE_SERVICE_ACCOUNT)."
          else
            echo "::error::Nenhum método de autenticação configurado."
            echo "Configure UM dos métodos abaixo em Settings → Secrets and variables → Actions:"
            echo "  1. GCP_WORKLOAD_IDENTITY_PROVIDER + GCP_SERVICE_ACCOUNT (Workload Identity Federation), ou"
            echo "  2. FIREBASE_SERVICE_ACCOUNT (conteúdo JSON completo da chave da conta de serviço)."
            echo "Alternativa manual, com o Firebase CLI logado localmente:"
            echo "  firebase use vide-digital-saas"
            echo "  firebase deploy --only firestore:rules,firestore:indexes,storage"
            exit 1
          fi

      - name: Autenticar via Workload Identity Federation
        if: steps.auth-method.outputs.method == 'wif'
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          project_id: ${{ inputs.project_id }}
          create_credentials_file: true
          export_environment_variables: true

      - name: Autenticar com a chave da conta de serviço
        if: steps.auth-method.outputs.method == 'sa-key'
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          project_id: ${{ inputs.project_id }}
          create_credentials_file: true
          export_environment_variables: true

      - name: Publicar primeiro as regras do Firestore
        shell: bash
        env:
          PROJECT_ID: ${{ inputs.project_id }}
        run: |
          set -euo pipefail
          pnpm dlx firebase-tools@13.35.1 deploy \
            --only firestore:rules \
            --project "${PROJECT_ID}" \
            --non-interactive

      - name: Publicar as regras do Storage
        shell: bash
        env:
          PROJECT_ID: ${{ inputs.project_id }}
        run: |
          set -euo pipefail
          pnpm dlx firebase-tools@13.35.1 deploy \
            --only storage \
            --project "${PROJECT_ID}" \
            --non-interactive

      - name: Publicar somente os índices do Firestore definidos no repositório
        shell: bash
        env:
          PROJECT_ID: ${{ inputs.project_id }}
        run: |
          set -euo pipefail
          pnpm dlx firebase-tools@13.35.1 deploy \
            --only firestore:indexes \
            --project "${PROJECT_ID}" \
            --non-interactive
