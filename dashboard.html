<!DOCTYPE html>
<html lang="pt-BR" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VideDigital | Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#09090b] text-white flex min-h-screen">

  <!-- MENU LATERAL -->
  <aside class="w-64 bg-[#0c0c0e] border-r border-[#1f1f23] flex flex-col justify-between p-6 shrink-0 sticky top-0 h-screen">
    <div class="space-y-8">
      <div class="px-2">
        <h1 class="text-xl font-bold tracking-tight text-white">Vide<span class="text-[#00f2fe]">Digital</span></h1>
      </div>
      <nav class="flex flex-col space-y-1">
        <button data-tab="visao-geral" class="tab-btn flex items-center space-x-3 w-full p-3 rounded-xl bg-[#18181b] text-white font-medium transition text-left shadow-sm">
          <span>📊</span> <span>Visão Geral</span>
        </button>
        <button data-tab="leads" class="tab-btn flex items-center space-x-3 w-full p-3 rounded-xl text-gray-400 hover:bg-[#121214] hover:text-white transition text-left">
          <span>👥</span> <span>Leads</span>
        </button>
        <button data-tab="dominio-pixel" class="tab-btn flex items-center space-x-3 w-full p-3 rounded-xl text-gray-400 hover:bg-[#121214] hover:text-white transition text-left">
          <span>⚙️</span> <span>Tracking</span>
        </button>
        <button data-tab="perfil" class="tab-btn flex items-center space-x-3 w-full p-3 rounded-xl text-gray-400 hover:bg-[#121214] hover:text-white transition text-left">
          <span>👤</span> <span>Perfil</span>
        </button>
      </nav>
    </div>
    <button id="btn-logout" class="flex items-center space-x-3 text-red-400/80 hover:text-red-400 p-3 rounded-xl transition text-left w-full hover:bg-red-950/20">
      <span>🚪</span> <span>Sair</span>
    </button>
  </aside>

  <!-- CONTEÚDO PRINCIPAL -->
  <main class="flex-1 p-10 overflow-y-auto w-full">
    <section id="tab-visao-geral" class="tab-content max-w-5xl mx-auto space-y-8">
      <div class="flex items-center justify-between">
        <div>
          <h2 class="text-2xl font-bold">Produtos</h2>
          <p class="text-sm text-gray-400">Gerencie as ofertas da sua vitrine.</p>
        </div>
        <button id="open-modal-produto" class="bg-[#00f2fe] hover:bg-[#00d8e4] text-black font-bold px-5 py-2.5 rounded-xl transition text-sm shadow-[0_0_15px_rgba(0,242,254,0.2)]">
          + Novo Produto
        </button>
      </div>
      <div id="lista-produtos" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
    </section>

    <!-- (Outras seções ocultas por padrão) -->
    <section id="tab-leads" class="tab-content hidden max-w-5xl mx-auto text-center py-20">
       <p class="text-gray-500">Nenhum lead capturado ainda.</p>
    </section>

    <!-- ... Seções de Domínio e Perfil mantêm a estrutura que você já possui ... -->
  </main>

  <!-- MODAL -->
  <div id="modal-produto" class="fixed inset-0 bg-black/60 backdrop-blur-sm hidden z-50 flex items-center justify-center p-4">
    <div class="w-full max-w-lg bg-[#121214] border border-[#27272a] rounded-2xl p-8 shadow-2xl">
      <h3 class="text-xl font-bold mb-6">Adicionar Produto</h3>
      <form id="form-produto" class="space-y-4">
        <input type="text" id="prod-nome" required class="w-full bg-[#09090b] border border-[#27272a] rounded-xl p-3 text-white focus:border-[#00f2fe] outline-none" placeholder="Nome do Produto">
        <textarea id="prod-descricao" required class="w-full bg-[#09090b] border border-[#27272a] rounded-xl p-3 text-white focus:border-[#00f2fe] outline-none" placeholder="Descrição..."></textarea>
        <div class="grid grid-cols-2 gap-4">
           <input type="text" id="prod-preco" required class="bg-[#09090b] border border-[#27272a] rounded-xl p-3 text-white focus:border-[#00f2fe] outline-none" placeholder="Preço (R$)">
           <input type="url" id="prod-checkout" required class="bg-[#09090b] border border-[#27272a] rounded-xl p-3 text-white focus:border-[#00f2fe] outline-none" placeholder="URL Checkout">
        </div>
        <div class="flex gap-3 pt-4">
          <button type="button" id="close-modal-produto" class="flex-1 p-3 rounded-xl bg-[#18181b] text-gray-400">Cancelar</button>
          <button type="submit" class="flex-1 p-3 rounded-xl bg-[#00f2fe] text-black font-bold">Salvar</button>
        </div>
      </form>
    </div>
  </div>

  <script type="module" src="dashboard.js"></script>
</body>
</html>
