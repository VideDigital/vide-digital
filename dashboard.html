<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Painel - Minha Loja Vide</title>
    <style>
        body { margin: 0; background-color: #0b0b0b; color: #fff; font-family: sans-serif; display: flex; }
        .sidebar { width: 250px; height: 100vh; background: #121212; padding: 20px; position: fixed; }
        .sidebar a { display: block; color: #aaa; padding: 15px; text-decoration: none; cursor: pointer; }
        .sidebar a.active { color: #00bcd4; font-weight: bold; }
        .main-content { margin-left: 250px; padding: 40px; width: 100%; }
        .app-section { display: none; }
        .app-section.active { display: block; }
        .card { background: #1a1a1a; padding: 25px; border-radius: 12px; border: 1px solid #333; margin-top: 20px; }
        .input-group { margin-bottom: 15px; }
        input { width: 100%; padding: 12px; background: #121212; border: 1px solid #333; color: #fff; border-radius: 5px; }
        button { padding: 12px 20px; background: #00bcd4; border: none; border-radius: 5px; color: #fff; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2 style="color: #fff; margin-bottom: 20px;">Minha Loja Vide</h2>
        <a class="menu-item active" data-target="sec-dashboard">📊 Visão Geral</a>
        <a class="menu-item" data-target="sec-perfil">👤 Perfil</a>
        <a id="sb-minhaloja" target="_blank" style="color: #00bcd4;">🏪 Minha Loja (Vitrine)</a>
        <a id="btn-logout" style="color: #ff5252; margin-top: auto;">🚪 Sair</a>
    </div>

    <div class="main-content">
        <div id="sec-dashboard" class="app-section active">
            <h2>Visão Geral</h2>
            <div class="card">
                <button id="btn-add-prod">+ Adicionar Produto</button>
                <div id="container-produtos-lista" style="margin-top: 20px;">Carregando produtos...</div>
            </div>
        </div>

        <div id="sec-perfil" class="app-section">
            <h2>Configurações do Perfil</h2>
            <div class="card">
                <label>Slug (Link da sua loja)</label>
                <input type="text" id="slug-input" placeholder="ex: minha-loja">
                <button id="btn-salvar-slug" style="margin-top: 10px;">ATUALIZAR</button>
                <div id="status-msg" style="margin-top: 20px;"></div>
            </div>
        </div>
    </div>
    <script type="module" src="dashboard.js"></script>
</body>
</html>
